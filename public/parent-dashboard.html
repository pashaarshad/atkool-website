<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard - ATKool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#F1F5F9; display:flex; height:100vh; overflow:hidden; }

        /* Sidebar */
        .sidebar { width:260px; background:linear-gradient(180deg,#0F172A 0%,#1e293b 100%); color:#fff; display:flex; flex-direction:column; box-shadow:4px 0 20px rgba(0,0,0,.1); z-index:10; }
        .sidebar-header { padding:20px; background:linear-gradient(135deg,#0F172A,#1e293b); border-bottom:1px solid rgba(255,255,255,.05); text-align:center; font-size:20px; font-weight:800; letter-spacing:1px; display:flex; align-items:center; justify-content:center; }
        .sidebar-menu { flex:1; padding:20px 12px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; }
        .menu-item { padding:14px 18px; color:#94a3b8; border-radius:12px; cursor:pointer; transition:.2s; display:flex; align-items:center; font-weight:600; font-size:13px; gap:12px; letter-spacing:.3px; }
        .menu-item:hover,.menu-item.active { background:linear-gradient(135deg,#4338CA,#6366f1); color:#fff; box-shadow:0 4px 15px rgba(67,56,202,.3); }
        .menu-item svg { width:20px; height:20px; flex-shrink:0; stroke:currentColor; }
        .logout-btn { padding:18px; text-align:center; background:linear-gradient(135deg,#dc2626,#ef4444); cursor:pointer; font-weight:700; transition:.3s; color:#fff; }
        .logout-btn:hover { background:linear-gradient(135deg,#b91c1c,#dc2626); }

        /* Main Content */
        .main-content { flex:1; display:flex; flex-direction:column; overflow-y:auto; background:#F1F5F9; }
        .top-navbar { background:#fff; padding:18px 30px; box-shadow:0 2px 10px rgba(0,0,0,.03); border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center; }
        .welcome-text { font-size:18px; font-weight:700; color:#0F172A; }
        .content-area { padding:30px; }

        /* Cards and Tables */
        .card { background:#fff; border-radius:16px; box-shadow:0 4px 15px rgba(0,0,0,.04); padding:25px; margin-bottom:25px; border:1px solid #e2e8f0; }
        .card-header { font-size:18px; font-weight:700; color:#0F172A; margin-bottom:20px; padding-bottom:15px; border-bottom:1px solid #f1f5f9; }

        table { width:100%; border-collapse:collapse; }
        th,td { padding:14px 16px; text-align:left; border-bottom:1px solid #f1f5f9; }
        th { background:#f8fafc; color:#64748b; font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
        tr:hover { background:#f8fafc; }

        .status-badge { padding:5px 12px; border-radius:20px; font-size:12px; font-weight:700; text-transform:capitalize; display:inline-block; }
        .status-present { background:linear-gradient(135deg,#10b981,#059669); color:#fff; }
        .status-absent { background:linear-gradient(135deg,#ef4444,#dc2626); color:#fff; }
        .status-late { background:linear-gradient(135deg,#f59e0b,#d97706); color:#fff; }
        
        .loader { text-align:center; padding:40px; color:#64748b; font-weight:500; }

        .stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:25px; }
        .stat-card { background:#fff; padding:25px; border-radius:16px; box-shadow:0 4px 15px rgba(0,0,0,.04); border:1px solid #e2e8f0; text-align:center; transition:transform .3s; }
        .stat-card:hover { transform:translateY(-3px); box-shadow:0 8px 25px rgba(67,56,202,.1); border-color:#c7d2fe; }
        .stat-value { font-size:36px; font-weight:800; background:linear-gradient(135deg,#4338CA,#7C3AED); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:5px; }
        .stat-label { color:#64748b; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header"><img src="/logo.jpeg" alt="ATKool" style="width:42px;height:42px;border-radius:10px;vertical-align:middle;margin-right:8px">ATKOOL</div>
        <div class="sidebar-menu">
            <div class="menu-item active" onclick="loadView('dashboard', this)">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                Overview
            </div>
            <div class="menu-item" onclick="loadView('attendance', this)">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                Attendance History
            </div>
        </div>
        <div class="logout-btn" onclick="logout()">LOGOUT</div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="top-navbar">
            <div class="welcome-text" id="welcomeText">Welcome, Parent!</div>
            <div style="font-size: 14px; color: #666;" id="dateText"></div>
        </div>

        <div class="content-area" id="mainContent">
            <!-- Dynamic content loads here -->
        </div>
    </div>

    <script>
        // Authentication Check
        const token = localStorage.getItem('parentToken');
        const parentDataStr = localStorage.getItem('parentData');
        
        if (!token || !parentDataStr) {
            window.location.href = '/parent-login.html';
        }

        const studentData = JSON.parse(parentDataStr);
        document.getElementById('welcomeText').innerText = `Welcome, ${studentData.parentName || 'Parent'}! (Student: ${studentData.name})`;
        
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('dateText').innerText = new Date().toLocaleDateString('en-US', options);

        function logout() {
            localStorage.removeItem('parentToken');
            localStorage.removeItem('parentData');
            window.location.href = '/parent-login.html';
        }

        async function fetchWithAuth(url) {
            const response = await fetch(url, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.status === 401) {
                logout();
                return null;
            }
            return response.json();
        }

        // View Router
        function loadView(view, el) {
            document.querySelectorAll('.menu-item').forEach(e => e.classList.remove('active'));
            if (el) {
                el.classList.add('active');
            } else {
                // Highlight first matching menu item
                const items = document.querySelectorAll('.menu-item');
                const idx = view === 'dashboard' ? 0 : view === 'attendance' ? 1 : 0;
                if (items[idx]) items[idx].classList.add('active');
            }

            const content = document.getElementById('mainContent');
            content.innerHTML = '<div class="loader">Loading data...</div>';

            if (view === 'dashboard') {
                content.innerHTML = `
                    <div class="card">
                        <div class="card-header">Student Profile</div>
                        <p><strong>Name:</strong> ${studentData.name}</p>
                        <p><strong>Class:</strong> ${studentData.className} ${studentData.section || ''}</p>
                        <p><strong>Roll No:</strong> ${studentData.rollNo || 'N/A'}</p>
                        <p><strong>Parent:</strong> ${studentData.parentName || 'N/A'}</p>
                        <p><strong>Status:</strong> <span style="background:#e8f5e9;color:#2e7d32;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600">${studentData.status || 'Active'}</span></p>
                    </div>
                `;
            } else if (view === 'attendance') {
                loadAttendance();
            }
        }

        async function loadAttendance() {
            const content = document.getElementById('mainContent');
            const data = await fetchWithAuth('/api/parent-auth/attendance');
            
            if (!data) return;

            let html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${data.stats.percentage}%</div>
                        <div class="stat-label">Attendance Rate</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="color:#2e7d32;">${data.stats.present}</div>
                        <div class="stat-label">Days Present</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="color:#c62828;">${data.stats.absent}</div>
                        <div class="stat-label">Days Absent</div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">Recent Attendance History</div>
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Remarks</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            if (data.records.length === 0) {
                html += `<tr><td colspan="3" style="text-align: center;">No attendance records found for this period.</td></tr>`;
            } else {
                data.records.forEach(r => {
                    const dateObj = new Date(r.date);
                    html += `
                        <tr>
                            <td><strong>${dateObj.toLocaleDateString()}</strong></td>
                            <td><span class="status-badge status-${r.status.toLowerCase()}">${r.status}</span></td>
                            <td>${r.remarks || '-'}</td>
                        </tr>
                    `;
                });
            }

            html += `</tbody></table></div>`;
            content.innerHTML = html;
        }

        // Load default view
        loadView('dashboard');
    </script>
</body>
</html>
