<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard - ATKool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#F1F5F9; display:flex; height:100vh; overflow:hidden; }

        /* Sidebar */
        .sidebar { width:260px; background:linear-gradient(180deg,#0F172A 0%,#1e293b 100%); color:#fff; display:flex; flex-direction:column; box-shadow:4px 0 20px rgba(0,0,0,.1); z-index:10; }
        .sidebar-header { padding:20px 24px; background:linear-gradient(135deg,#0F172A,#1e293b); border-bottom:1px solid rgba(255,255,255,.05); display:flex; align-items:center; gap:12px; }
        .school-logo { width:40px; height:40px; border-radius:10px; background:rgba(255,255,255,.1); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; }
        .school-logo img { width:100%; height:100%; object-fit:cover; }
        .school-logo svg { width:24px; height:24px; stroke:#c7d2fe; }
        .brand-name { font-size:20px; font-weight:800; letter-spacing:1px; color:#fff; }
        
        .sidebar-menu { flex:1; padding:20px 12px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; }
        .menu-item { padding:14px 18px; color:#94a3b8; border-radius:12px; cursor:pointer; transition:.2s; display:flex; align-items:center; font-weight:600; font-size:13px; gap:12px; letter-spacing:.3px; }
        .menu-item:hover { background:rgba(255,255,255,.05); color:#fff; }
        .menu-item.active { background:linear-gradient(135deg,#4338CA,#6366f1); color:#fff; box-shadow:0 4px 15px rgba(67,56,202,.3); }
        .menu-item svg { width:20px; height:20px; flex-shrink:0; stroke:currentColor; }
        .logout-btn { margin:20px; padding:14px; text-align:center; background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.2); border-radius:12px; cursor:pointer; font-weight:700; transition:.3s; color:#ef4444; font-size:13px; }
        .logout-btn:hover { background:#ef4444; color:#fff; }

        /* Main Content */
        .main-content { flex:1; display:flex; flex-direction:column; overflow-y:auto; background:#F1F5F9; }
        .top-navbar { background:#fff; margin:16px 24px; padding:18px 24px; border-radius:16px; box-shadow:0 2px 10px rgba(0,0,0,.03); border:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center; }
        .welcome-text { font-size:18px; font-weight:800; color:#0F172A; display:flex; align-items:center; gap:10px; }
        .welcome-icon { width:36px; height:36px; background:#eef2ff; color:#4338CA; border-radius:10px; display:flex; align-items:center; justify-content:center; }
        .welcome-icon svg { width:20px; height:20px; stroke:currentColor; }
        .content-area { padding:0 24px 24px; }

        /* Cards and Tables */
        .card { background:#fff; border-radius:16px; box-shadow:0 4px 15px rgba(0,0,0,.03); padding:28px; margin-bottom:24px; border:1px solid #e2e8f0; transition:all .3s; }
        .card:hover { border-color:#c7d2fe; box-shadow:0 8px 25px rgba(67,56,202,.08); }
        .card-header { font-size:18px; font-weight:800; color:#0F172A; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid #f1f5f9; display:flex; align-items:center; gap:10px; }
        .card-header svg { width:24px; height:24px; stroke:#4338CA; }

        .profile-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px; }
        .profile-item { background:#f8fafc; padding:16px; border-radius:12px; border:1px solid #e2e8f0; }
        .profile-label { font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
        .profile-value { font-size:15px; font-weight:700; color:#0F172A; }

        table { width:100%; border-collapse:collapse; }
        th,td { padding:16px; text-align:left; border-bottom:1px solid #f1f5f9; }
        th { background:linear-gradient(135deg,#0F172A,#1e293b); color:#fff; font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
        th:first-child { border-top-left-radius:12px; border-bottom-left-radius:12px; }
        th:last-child { border-top-right-radius:12px; border-bottom-right-radius:12px; }
        tr:hover td { background:#f8fafc; }

        .status-badge { padding:6px 14px; border-radius:20px; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; display:inline-block; }
        .status-active { background:#d1fae5; color:#059669; }
        .status-present { background:#d1fae5; color:#059669; }
        .status-absent { background:#fee2e2; color:#dc2626; }
        .status-late { background:#fef3c7; color:#d97706; }
        
        .loader { text-align:center; padding:40px; color:#64748b; font-weight:600; font-size:14px; }

        .stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:24px; }
        .stat-card { background:#fff; padding:24px; border-radius:16px; box-shadow:0 4px 15px rgba(0,0,0,.03); border:1px solid #e2e8f0; text-align:center; transition:transform .3s; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .stat-card:hover { transform:translateY(-4px); box-shadow:0 8px 25px rgba(67,56,202,.1); border-color:#c7d2fe; }
        .stat-icon { width:48px; height:48px; border-radius:12px; background:#eef2ff; color:#4338CA; display:flex; align-items:center; justify-content:center; margin-bottom:16px; }
        .stat-icon svg { width:24px; height:24px; stroke:currentColor; }
        .stat-value { font-size:32px; font-weight:800; color:#0F172A; margin-bottom:6px; }
        .stat-label { color:#64748b; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="school-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
            </div>
            <div class="brand-name">ATKOOL</div>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item active" onclick="loadView('dashboard', this)">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                Overview
            </div>
            <div class="menu-item" onclick="loadView('attendance', this)">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                Attendance History
            </div>
        </div>
        <div class="logout-btn" onclick="logout()">LOGOUT</div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="top-navbar">
            <div class="welcome-text" id="welcomeText">
                <div class="welcome-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
                <span>Welcome, Parent!</span>
            </div>
            <div style="font-size: 13px; font-weight:600; color: #64748b;" id="dateText"></div>
        </div>

        <div class="content-area" id="mainContent">
            <!-- Dynamic content loads here -->
        </div>
    </div>

    <script>
        // Authentication Check
        const token = localStorage.getItem('parentToken');
        const parentDataStr = localStorage.getItem('parentData');
        
        if (!token || !parentDataStr) {
            window.location.href = '/parent-login.html';
        }

        const studentData = JSON.parse(parentDataStr);
        document.getElementById('welcomeText').innerHTML = `
            <div class="welcome-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <span>Welcome, ${studentData.parentName || 'Parent'}! <span style="color:#64748b;font-weight:600;font-size:15px;margin-left:8px">(Student: ${studentData.name})</span></span>
        `;
        
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('dateText').innerText = new Date().toLocaleDateString('en-US', options);

        function logout() {
            localStorage.removeItem('parentToken');
            localStorage.removeItem('parentData');
            window.location.href = '/parent-login.html';
        }

        async function fetchWithAuth(url) {
            const response = await fetch(url, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.status === 401) {
                logout();
                return null;
            }
            return response.json();
        }

        // View Router
        function loadView(view, el) {
            document.querySelectorAll('.menu-item').forEach(e => e.classList.remove('active'));
            if (el) {
                el.classList.add('active');
            } else {
                // Highlight first matching menu item
                const items = document.querySelectorAll('.menu-item');
                const idx = view === 'dashboard' ? 0 : view === 'attendance' ? 1 : 0;
                if (items[idx]) items[idx].classList.add('active');
            }

            const content = document.getElementById('mainContent');
            content.innerHTML = '<div class="loader">Loading data...</div>';

            if (view === 'dashboard') {
                content.innerHTML = `
                    <div class="card">
                        <div class="card-header">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            Student Profile Overview
                        </div>
                        <div class="profile-grid">
                            <div class="profile-item">
                                <div class="profile-label">Student Name</div>
                                <div class="profile-value">${studentData.name}</div>
                            </div>
                            <div class="profile-item">
                                <div class="profile-label">Class & Section</div>
                                <div class="profile-value">${studentData.className} ${studentData.section || ''}</div>
                            </div>
                            <div class="profile-item">
                                <div class="profile-label">Roll Number</div>
                                <div class="profile-value">${studentData.rollNo || 'N/A'}</div>
                            </div>
                            <div class="profile-item">
                                <div class="profile-label">Parent Name</div>
                                <div class="profile-value">${studentData.parentName || 'N/A'}</div>
                            </div>
                            <div class="profile-item">
                                <div class="profile-label">Account Status</div>
                                <div class="profile-value"><span class="status-badge status-active">${studentData.status || 'Active'}</span></div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (view === 'attendance') {
                loadAttendance();
            }
        }

        async function loadAttendance() {
            const content = document.getElementById('mainContent');
            const data = await fetchWithAuth('/api/parent-auth/attendance');
            
            if (!data) return;

            let html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${data.stats.percentage}%</div>
                        <div class="stat-label">Attendance Rate</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="color:#2e7d32;">${data.stats.present}</div>
                        <div class="stat-label">Days Present</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="color:#c62828;">${data.stats.absent}</div>
                        <div class="stat-label">Days Absent</div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">Recent Attendance History</div>
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Remarks</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            if (data.records.length === 0) {
                html += `<tr><td colspan="3" style="text-align: center;">No attendance records found for this period.</td></tr>`;
            } else {
                data.records.forEach(r => {
                    const dateObj = new Date(r.date);
                    html += `
                        <tr>
                            <td><strong>${dateObj.toLocaleDateString()}</strong></td>
                            <td><span class="status-badge status-${r.status.toLowerCase()}">${r.status}</span></td>
                            <td>${r.remarks || '-'}</td>
                        </tr>
                    `;
                });
            }

            html += `</tbody></table></div>`;
            content.innerHTML = html;
        }

        // Load default view
        loadView('dashboard');
    </script>
</body>
</html>
