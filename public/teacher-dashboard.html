<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - ATKool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#f4f7f6; display:flex; height:100vh; overflow:hidden; }

        /* Sidebar */
        .sidebar { width:260px; background:#1a1a1a; color:#fff; display:flex; flex-direction:column; }
        .sidebar-header { padding:20px; background:#6B4EFF; text-align:center; font-size:20px; font-weight:700; letter-spacing:1px; }
        .sidebar-menu { flex:1; padding:20px 0; overflow-y:auto; }
        .menu-item { padding:14px 25px; color:#a0a0a0; cursor:pointer; transition:.2s; display:flex; align-items:center; font-weight:500; border-left:4px solid transparent; gap:12px; }
        .menu-item:hover,.menu-item.active { background:rgba(107,78,255,.1); color:#fff; border-left-color:#6B4EFF; }
        .menu-item svg { width:20px; height:20px; flex-shrink:0; }
        .logout-btn { padding:18px; text-align:center; background:#d32f2f; cursor:pointer; font-weight:600; transition:.3s; color:#fff; }
        .logout-btn:hover { background:#b71c1c; }

        /* Main */
        .main-content { flex:1; display:flex; flex-direction:column; overflow-y:auto; }
        .top-navbar { background:#fff; padding:18px 30px; box-shadow:0 2px 10px rgba(0,0,0,.05); display:flex; justify-content:space-between; align-items:center; }
        .welcome-text { font-size:18px; font-weight:600; color:#333; }
        .content-area { padding:25px 30px; }

        /* Stats Grid */
        .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:25px; }
        .stat-card { padding:22px; border-radius:16px; color:#fff; position:relative; overflow:hidden; }
        .stat-card::after { content:''; position:absolute; top:-20px; right:-20px; width:80px; height:80px; border-radius:50%; background:rgba(255,255,255,.1); }
        .stat-card .value { font-size:32px; font-weight:700; }
        .stat-card .label { font-size:13px; opacity:.85; margin-top:4px; }
        .stat-card .icon { position:absolute; top:20px; right:20px; opacity:.3; font-size:28px; }
        .bg-red { background:linear-gradient(135deg,#DC3545,#c82333); }
        .bg-green { background:linear-gradient(135deg,#28A745,#218838); }
        .bg-blue { background:linear-gradient(135deg,#007BFF,#0069d9); }
        .bg-purple { background:linear-gradient(135deg,#6B4EFF,#5a3de6); }

        /* Cards */
        .card { background:#fff; border-radius:14px; box-shadow:0 4px 15px rgba(0,0,0,.05); padding:22px; margin-bottom:22px; }
        .card-header { font-size:17px; font-weight:600; color:#1a1a1a; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center; }
        .card-header .badge { background:#6B4EFF; color:#fff; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; }

        /* Quick Actions */
        .quick-actions { display:grid; grid-template-columns:repeat(3,1fr); gap:15px; margin-bottom:25px; }
        .action-tile { background:#fff; border-radius:14px; padding:22px; text-align:center; cursor:pointer; transition:.3s; box-shadow:0 2px 10px rgba(0,0,0,.05); border:2px solid transparent; }
        .action-tile:hover { transform:translateY(-3px); box-shadow:0 8px 25px rgba(0,0,0,.1); border-color:#6B4EFF; }
        .action-tile .tile-icon { width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center; margin:0 auto 12px; }
        .action-tile .tile-icon svg { width:26px; height:26px; color:#fff; }
        .action-tile .tile-label { font-size:13px; font-weight:600; color:#333; }

        /* Tables */
        table { width:100%; border-collapse:collapse; }
        th,td { padding:13px 15px; text-align:left; border-bottom:1px solid #eee; }
        th { background:#f9f9f9; color:#666; font-weight:600; font-size:13px; text-transform:uppercase; }
        tr:hover { background:#fcfcfc; }
        .badge { padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; display:inline-block; }
        .badge-green { background:#e8f5e9; color:#2e7d32; }
        .badge-red { background:#ffebee; color:#c62828; }
        .badge-orange { background:#fff3e0; color:#ef6c00; }
        .badge-blue { background:#e3f2fd; color:#1565c0; }

        /* Attendance */
        .attendance-controls { display:flex; gap:15px; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
        .date-input { padding:10px 16px; border:2px solid #e0e0e0; border-radius:10px; font-family:inherit; font-size:14px; }
        .date-input:focus { border-color:#6B4EFF; outline:none; }
        .student-attendance-row { display:flex; align-items:center; padding:12px 16px; background:#fff; border-radius:12px; margin-bottom:8px; box-shadow:0 1px 4px rgba(0,0,0,.04); }
        .student-attendance-row .student-info { flex:1; }
        .student-attendance-row .student-name { font-weight:600; color:#1a1a1a; }
        .student-attendance-row .student-meta { font-size:12px; color:#888; }
        .att-btn { width:48px; height:48px; border-radius:12px; border:2px solid; font-size:20px; font-weight:700; cursor:pointer; transition:.2s; display:flex; align-items:center; justify-content:center; }
        .att-btn.present { border-color:#28A745; background:rgba(40,167,69,.1); color:#28A745; }
        .att-btn.present.active { background:#28A745; color:#fff; }
        .att-btn.absent { border-color:#DC3545; background:rgba(220,53,69,.1); color:#DC3545; }
        .att-btn.absent.active { background:#DC3545; color:#fff; }

        /* Buttons */
        .btn { padding:12px 24px; border:none; border-radius:10px; font-family:inherit; font-weight:600; cursor:pointer; transition:.2s; font-size:14px; }
        .btn-primary { background:#6B4EFF; color:#fff; }
        .btn-primary:hover { background:#5a3de6; }
        .btn-success { background:#28A745; color:#fff; }
        .btn-success:hover { background:#218838; }
        .btn-success:disabled { background:#ccc; cursor:not-allowed; }
        .btn-outline { background:transparent; border:2px solid #6B4EFF; color:#6B4EFF; }

        /* Form */
        .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; }
        .form-group { margin-bottom:15px; }
        .form-group label { display:block; font-size:13px; font-weight:600; color:#555; margin-bottom:6px; }
        .form-group input,.form-group select { width:100%; padding:10px 14px; border:2px solid #e0e0e0; border-radius:10px; font-family:inherit; font-size:14px; }
        .form-group input:focus,.form-group select:focus { border-color:#6B4EFF; outline:none; }

        /* Summary bar */
        .summary-bar { display:flex; gap:15px; padding:16px; background:#f8f9fa; border-radius:12px; margin-bottom:20px; }
        .summary-item { flex:1; text-align:center; padding:12px; border-radius:10px; }
        .summary-item .count { font-size:28px; font-weight:700; color:#fff; }
        .summary-item .text { font-size:12px; color:rgba(255,255,255,.8); }

        .loader { text-align:center; padding:40px; color:#666; }
        .empty-state { text-align:center; padding:50px; color:#888; }
        .empty-state svg { width:60px; height:60px; margin-bottom:15px; opacity:.4; }

        /* Toast */
        .toast { position:fixed; bottom:30px; right:30px; padding:14px 24px; border-radius:12px; color:#fff; font-weight:600; z-index:999; transform:translateY(100px); opacity:0; transition:.3s; }
        .toast.show { transform:translateY(0); opacity:1; }
        .toast-success { background:#28A745; }
        .toast-error { background:#DC3545; }

        @media(max-width:768px) {
            .sidebar { display:none; }
            .stats-grid { grid-template-columns:repeat(2,1fr); }
            .quick-actions { grid-template-columns:repeat(2,1fr); }
            .form-grid { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><img src="/logo.jpeg" alt="ATKool" style="width:42px;height:42px;border-radius:10px;vertical-align:middle;margin-right:8px">ATKOOL</div>
        <div class="sidebar-menu" id="sidebarMenu"></div>
        <div class="logout-btn" onclick="logout()">LOGOUT</div>
    </div>
    <div class="main-content">
        <div class="top-navbar">
            <div class="welcome-text" id="welcomeText">Welcome, Teacher!</div>
            <div style="font-size:14px;color:#666;" id="dateText"></div>
        </div>
        <div class="content-area" id="mainContent">
            <div class="loader">Loading...</div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
<script src="js/teacher-dashboard.js"></script>
</body>
</html>
