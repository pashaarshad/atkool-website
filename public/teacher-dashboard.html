<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - ATKool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#F1F5F9; display:flex; height:100vh; overflow:hidden; }

        /* Sidebar */
        .sidebar { width:260px; background:linear-gradient(180deg,#0F172A 0%,#1e293b 100%); color:#fff; display:flex; flex-direction:column; box-shadow:4px 0 20px rgba(0,0,0,.1); z-index:10; }
        .sidebar-header { padding:20px 24px; background:linear-gradient(135deg,#0F172A,#1e293b); border-bottom:1px solid rgba(255,255,255,.05); display:flex; align-items:center; gap:12px; }
        .school-logo { width:40px; height:40px; border-radius:10px; background:rgba(255,255,255,.1); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; }
        .school-logo img { width:100%; height:100%; object-fit:cover; }
        .school-logo svg { width:24px; height:24px; stroke:#c7d2fe; }
        .brand-name { font-size:20px; font-weight:800; letter-spacing:1px; color:#fff; }
        
        .sidebar-menu { flex:1; padding:20px 12px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; }
        .menu-item { padding:14px 18px; color:#94a3b8; border-radius:12px; cursor:pointer; transition:.2s; display:flex; align-items:center; font-weight:600; font-size:13px; gap:12px; letter-spacing:.3px; }
        .menu-item:hover { background:rgba(255,255,255,.05); color:#fff; }
        .menu-item.active { background:linear-gradient(135deg,#4338CA,#6366f1); color:#fff; box-shadow:0 4px 15px rgba(67,56,202,.3); }
        .menu-item svg { width:20px; height:20px; flex-shrink:0; stroke:currentColor; }
        .logout-btn { margin:20px; padding:14px; text-align:center; background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.2); border-radius:12px; cursor:pointer; font-weight:700; transition:.3s; color:#ef4444; font-size:13px; }
        .logout-btn:hover { background:#ef4444; color:#fff; }

        /* Main Content */
        .main-content { flex:1; display:flex; flex-direction:column; overflow-y:auto; background:#F1F5F9; }
        .top-navbar { background:#fff; margin:16px 24px; padding:18px 24px; border-radius:16px; box-shadow:0 2px 10px rgba(0,0,0,.03); border:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center; }
        .welcome-text { font-size:18px; font-weight:800; color:#0F172A; display:flex; align-items:center; gap:10px; }
        .welcome-icon { width:36px; height:36px; background:#eef2ff; color:#4338CA; border-radius:10px; display:flex; align-items:center; justify-content:center; }
        .welcome-icon svg { width:20px; height:20px; stroke:currentColor; }
        .content-area { padding:0 24px 24px; }

        /* Stats Grid */
        .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:25px; }
        .stat-card { padding:22px; border-radius:16px; color:#fff; position:relative; overflow:hidden; box-shadow:0 4px 15px rgba(0,0,0,.05); transition:transform .3s; }
        .stat-card:hover { transform:translateY(-3px); box-shadow:0 8px 25px rgba(0,0,0,.1); }
        .stat-card::after { content:''; position:absolute; top:-20px; right:-20px; width:80px; height:80px; border-radius:50%; background:rgba(255,255,255,.1); }
        .stat-card .value { font-size:32px; font-weight:800; }
        .stat-card .label { font-size:13px; opacity:.9; margin-top:4px; font-weight:500; text-transform:uppercase; letter-spacing:.5px; }
        .stat-card .icon { position:absolute; top:20px; right:20px; opacity:.3; font-size:28px; }
        .bg-red { background:linear-gradient(135deg,#ef4444,#dc2626); }
        .bg-green { background:linear-gradient(135deg,#10b981,#059669); }
        .bg-blue { background:linear-gradient(135deg,#3b82f6,#2563eb); }
        .bg-purple { background:linear-gradient(135deg,#4338CA,#7C3AED); }

        /* Cards */
        .card { background:#fff; border-radius:16px; box-shadow:0 4px 15px rgba(0,0,0,.04); padding:24px; margin-bottom:22px; border:1px solid #e2e8f0; }
        .card-header { font-size:17px; font-weight:700; color:#0F172A; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid #f1f5f9; display:flex; justify-content:space-between; align-items:center; }
        .card-header .badge { background:linear-gradient(135deg,#4338CA,#7C3AED); color:#fff; padding:5px 14px; border-radius:20px; font-size:12px; font-weight:700; box-shadow:0 2px 8px rgba(67,56,202,.2); }

        /* Quick Actions */
        .quick-actions { display:grid; grid-template-columns:repeat(3,1fr); gap:15px; margin-bottom:25px; }
        .action-tile { background:#fff; border-radius:16px; padding:22px; text-align:center; cursor:pointer; transition:all .3s; box-shadow:0 2px 8px rgba(0,0,0,.03); border:1px solid #e2e8f0; }
        .action-tile:hover { transform:translateY(-3px); box-shadow:0 8px 20px rgba(67,56,202,.1); border-color:#c7d2fe; background:linear-gradient(135deg,#eef2ff,#f5f3ff); }
        .action-tile .tile-icon { width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center; margin:0 auto 12px; }
        .action-tile .tile-icon svg { width:26px; height:26px; color:#fff; }
        .action-tile .tile-label { font-size:13px; font-weight:700; color:#334155; }

        /* Tables */
        table { width:100%; border-collapse:collapse; }
        th,td { padding:14px 16px; text-align:left; border-bottom:1px solid #f1f5f9; }
        th { background:#f8fafc; color:#64748b; font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
        tr:hover { background:#f8fafc; }
        .badge { padding:5px 12px; border-radius:20px; font-size:12px; font-weight:700; display:inline-block; }
        .badge-green { background:linear-gradient(135deg,#10b981,#059669); color:#fff; }
        .badge-red { background:linear-gradient(135deg,#ef4444,#dc2626); color:#fff; }
        .badge-orange { background:#fff3e0; color:#ef6c00; }
        .badge-blue { background:#e3f2fd; color:#1565c0; }

        /* Attendance */
        .attendance-controls { display:flex; gap:15px; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
        .date-input { padding:10px 16px; border:2px solid #e0e0e0; border-radius:10px; font-family:inherit; font-size:14px; }
        .date-input:focus { border-color:#6B4EFF; outline:none; }
        .student-attendance-row { display:flex; align-items:center; padding:12px 16px; background:#fff; border-radius:12px; margin-bottom:8px; box-shadow:0 1px 4px rgba(0,0,0,.04); }
        .student-attendance-row .student-info { flex:1; }
        .student-attendance-row .student-name { font-weight:600; color:#1a1a1a; }
        .student-attendance-row .student-meta { font-size:12px; color:#888; }
        .att-btn { width:48px; height:48px; border-radius:12px; border:2px solid; font-size:20px; font-weight:700; cursor:pointer; transition:.2s; display:flex; align-items:center; justify-content:center; }
        .att-btn.present { border-color:#28A745; background:rgba(40,167,69,.1); color:#28A745; }
        .att-btn.present.active { background:#28A745; color:#fff; }
        .att-btn.absent { border-color:#DC3545; background:rgba(220,53,69,.1); color:#DC3545; }
        .att-btn.absent.active { background:#DC3545; color:#fff; }

        /* Buttons */
        .btn { padding:12px 24px; border:none; border-radius:10px; font-family:inherit; font-weight:600; cursor:pointer; transition:.2s; font-size:14px; }
        .btn-primary { background:#6B4EFF; color:#fff; }
        .btn-primary:hover { background:#5a3de6; }
        .btn-success { background:#28A745; color:#fff; }
        .btn-success:hover { background:#218838; }
        .btn-success:disabled { background:#ccc; cursor:not-allowed; }
        .btn-outline { background:transparent; border:2px solid #6B4EFF; color:#6B4EFF; }

        /* Form */
        .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; }
        .form-group { margin-bottom:15px; }
        .form-group label { display:block; font-size:13px; font-weight:600; color:#555; margin-bottom:6px; }
        .form-group input,.form-group select { width:100%; padding:10px 14px; border:2px solid #e0e0e0; border-radius:10px; font-family:inherit; font-size:14px; }
        .form-group input:focus,.form-group select:focus { border-color:#6B4EFF; outline:none; }

        /* Summary bar */
        .summary-bar { display:flex; gap:15px; padding:16px; background:#f8f9fa; border-radius:12px; margin-bottom:20px; }
        .summary-item { flex:1; text-align:center; padding:12px; border-radius:10px; }
        .summary-item .count { font-size:28px; font-weight:700; color:#fff; }
        .summary-item .text { font-size:12px; color:rgba(255,255,255,.8); }

        .loader { text-align:center; padding:40px; color:#666; }
        .empty-state { text-align:center; padding:50px; color:#888; }
        .empty-state svg { width:60px; height:60px; margin-bottom:15px; opacity:.4; }

        /* Toast */
        .toast { position:fixed; bottom:30px; right:30px; padding:14px 24px; border-radius:12px; color:#fff; font-weight:600; z-index:999; transform:translateY(100px); opacity:0; transition:.3s; }
        .toast.show { transform:translateY(0); opacity:1; }
        .toast-success { background:#28A745; }
        .toast-error { background:#DC3545; }

        @media(max-width:768px) {
            .sidebar { display:none; }
            .stats-grid { grid-template-columns:repeat(2,1fr); }
            .quick-actions { grid-template-columns:repeat(2,1fr); }
            .form-grid { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="school-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
            </div>
            <div class="brand-name">ATKOOL</div>
        </div>
        <div class="sidebar-menu" id="sidebarMenu"></div>
        <div class="logout-btn" onclick="logout()">LOGOUT</div>
    </div>
    <div class="main-content">
        <div class="top-navbar">
            <div class="welcome-text" id="welcomeText">
                <div class="welcome-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
                <span>Welcome, Teacher!</span>
            </div>
            <div style="font-size: 13px; font-weight:600; color: #64748b;" id="dateText"></div>
        </div>
        <div class="content-area" id="mainContent">
            <div class="loader">Loading...</div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
<script src="js/teacher-dashboard.js"></script>
</body>
</html>
