<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overview - School Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="plan-check.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #c0c0c0;
        }

        .school-header {
            background-color: #333;
            border: 3px solid #000;
            border-radius: 10px;
            margin: 10px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .school-header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .school-logo {
            width: 50px;
            height: 50px;
            background-color: #87CEEB;
            border-radius: 50%;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .school-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .school-logo svg {
            width: 30px;
            height: 30px;
            stroke: #333;
        }

        .school-name {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            flex: 1;
            text-align: center;
        }

        .school-header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .header-icon svg {
            width: 28px;
            height: 28px;
            stroke: #fff;
        }

        .school-main {
            display: flex;
            gap: 0;
            padding: 0 10px 10px 10px;
        }

        .school-sidebar {
            width: 160px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 15px;
        }

        .school-sidebar-item {
            background-color: #fff;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 12px 15px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .school-sidebar-item:hover {
            background-color: #f0f0f0;
        }

        .school-sidebar-item.active {
            background-color: #000;
            color: #fff;
        }

        .school-content {
            flex: 1;
            padding: 10px;
        }

        .stats-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            flex: 1;
            background-color: #fff;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .stat-card-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .stat-card-value {
            font-size: 48px;
            font-weight: bold;
            color: #000;
        }

        .charts-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-card {
            flex: 1;
            background-color: #fff;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 20px;
            min-height: 250px;
        }

        .chart-title {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 200px;
            padding: 20px 10px 0 10px;
        }

        .bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 80px;
        }

        .bar {
            width: 40px;
            background-color: #333;
            border-radius: 5px 5px 0 0;
            min-height: 5px;
        }

        .bar-label {
            font-size: 11px;
            color: #666;
            margin-top: 8px;
            text-align: center;
        }

        .bar-value {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-top: 2px;
        }

        .line-chart {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .line-chart svg {
            width: 100%;
            height: 100%;
        }

        .donut-chart {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .donut-chart svg {
            width: 100px;
            height: 100px;
        }

        .donut-legend {
            font-size: 12px;
        }

        .donut-legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 5px;
        }

        .donut-legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .profile-wrapper {
            position: relative;
        }

        .profile-dropdown {
            display: none;
            position: absolute;
            top: 50px;
            right: 0;
            background-color: #fff;
            border: 2px solid #333;
            border-radius: 10px;
            min-width: 150px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        .profile-dropdown.show {
            display: block;
        }

        .profile-dropdown-item {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #333;
            border-bottom: 1px solid #eee;
        }

        .profile-dropdown-item:last-child {
            border-bottom: none;
        }

        .profile-dropdown-item:hover {
            background-color: #f5f5f5;
        }

        .profile-dropdown-item.logout {
            color: #e74c3c;
        }

        .overview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width-chart {
            background-color: #fff;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 20px;
            min-height: 150px;
        }
    </style>
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="school-header">
        <div class="school-header-left">
            <div class="school-logo" id="schoolLogo">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                    <path d="M3 21h18M3 7v14M21 7v14M6 21V10M18 21V10M9 21V17h6v4M12 7V3l8 4M4 7l8-4"></path>
                </svg>
            </div>
        </div>
        <div class="school-name" id="schoolName">Loading...</div>
        <div class="school-header-right">
            <div class="profile-wrapper">
                <div class="header-icon" id="profileIcon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <div class="profile-dropdown" id="profileDropdown">
                    <div class="profile-dropdown-item" id="profileEmail">Loading...</div>
                    <div class="profile-dropdown-item logout" onclick="logout()">Logout</div>
                </div>
            </div>
        </div>
    </div>

    <div class="school-main">
        <div class="school-sidebar">
            <a href="dashboard.html" class="school-sidebar-item">HOME</a>
            <a href="teachers.html" class="school-sidebar-item">TEACHER</a>
            <a href="students.html" class="school-sidebar-item">STUDENTS</a>
            <a href="pending-students.html" class="school-sidebar-item">PENDING</a>
            <a href="overview.html" class="school-sidebar-item active">OVERVIEW</a>
            <a href="plans.html" class="school-sidebar-item">PLANS</a>
            <a href="support.html" class="school-sidebar-item">SUPPORT</a>
            <a href="send-message.html" class="school-sidebar-item">SEND MESSAGE</a>
            <a href="events.html" class="school-sidebar-item">EVENTS</a>
            <a href="exams.html" class="school-sidebar-item">EXAMS</a>
            <div class="school-sidebar-item" onclick="logout()">LOGOUT</div>
        </div>

        <div class="school-content">
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-card-label">Total Students</div>
                    <div class="stat-card-value" id="totalStudents">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-label">Teachers</div>
                    <div class="stat-card-value" id="totalTeachers">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-label">Attendance</div>
                    <div class="stat-card-value" id="attendance">89%</div>
                </div>
            </div>

            <div class="chart-card" style="margin-top:20px;">
                <div class="chart-title">Students per Class</div>
                <div class="bar-chart" id="classChart">
                    <div style="text-align:center;padding:40px;color:#666;">Loading chart data...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showToast(message, type) {
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast ' + (type || 'info');
            toast.innerHTML = '<span class="toast-message">' + message + '</span>';
            container.appendChild(toast);
            setTimeout(function () { toast.remove(); }, 3000);
        }

        document.addEventListener('DOMContentLoaded', function () {
            var token = localStorage.getItem('schoolToken');
            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            loadSchoolData();
            loadClassChart();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('profileIcon').addEventListener('click', function (e) {
                e.stopPropagation();
                document.getElementById('profileDropdown').classList.toggle('show');
            });

            document.addEventListener('click', function () {
                document.getElementById('profileDropdown').classList.remove('show');
            });
        }

        async function loadSchoolData() {
            var token = localStorage.getItem('schoolToken');
            try {
                var response = await fetch('/api/school-auth/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!response.ok) {
                    window.location.href = 'index.html';
                    return;
                }
                var school = await response.json();
                document.getElementById('schoolName').textContent = school.name.toUpperCase();
                document.getElementById('profileEmail').textContent = school.email || 'Profile';
                document.getElementById('totalStudents').textContent = school.students || 0;
                document.getElementById('totalTeachers').textContent = school.teachers || 0;
                if (school.logo) {
                    document.getElementById('schoolLogo').innerHTML = '<img src="' + school.logo + '" alt="Logo">';
                }
            } catch (error) {
                console.error('Load school data error:', error);
            }
        }

        async function loadClassChart() {
            var token = localStorage.getItem('schoolToken');
            var chartContainer = document.getElementById('classChart');

            try {
                var response = await fetch('/api/students/classes', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (!response.ok) {
                    chartContainer.innerHTML = '<div style="text-align:center;padding:40px;color:#666;">No data available</div>';
                    return;
                }

                var classes = await response.json();

                if (classes.length === 0) {
                    chartContainer.innerHTML = '<div style="text-align:center;padding:40px;color:#666;">No class data. Add students to see chart.</div>';
                    return;
                }

                var maxStudents = Math.max.apply(null, classes.map(function (c) { return c.studentCount; }));

                var barsHtml = classes.map(function (c) {
                    var heightPercent = (c.studentCount / maxStudents) * 100;
                    return '<div class="bar-item">' +
                        '<div class="bar" style="height:' + heightPercent + '%;"></div>' +
                        '<div class="bar-label">' + c.className + ' ' + c.section + '</div>' +
                        '<div class="bar-value">' + c.studentCount + '</div>' +
                        '</div>';
                }).join('');

                chartContainer.innerHTML = barsHtml;

            } catch (error) {
                console.error('Load class chart error:', error);
                chartContainer.innerHTML = '<div style="text-align:center;padding:40px;color:#666;">Error loading chart</div>';
            }
        }

        function logout() {
            localStorage.removeItem('schoolToken');
            localStorage.removeItem('schoolData');
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
