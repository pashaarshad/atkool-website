<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exams - School Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="plan-check.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#F1F5F9; }
        .school-header { background:linear-gradient(135deg,#0F172A,#1e293b); border:none; border-radius:16px; margin:12px; padding:16px 28px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 4px 20px rgba(0,0,0,.15); }
        .school-header-left { display:flex; align-items:center; gap:20px; }
        .school-logo { width:48px; height:48px; border-radius:12px; border:none; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; cursor:pointer; transition:all .3s; }
        .school-logo:hover { transform:scale(1.05); }
        .school-logo img { width:100%; height:100%; object-fit:cover; border-radius:12px; }
        .school-logo svg { width:30px; height:30px; stroke:#c7d2fe; }
        .school-name { color:#fff; font-size:24px; font-weight:800; letter-spacing:1px; flex:1; text-align:center; }
        .school-header-right { display:flex; align-items:center; gap:16px; }
        .header-icon { width:40px; height:40px; display:flex; align-items:center; justify-content:center; cursor:pointer; background:rgba(255,255,255,.08); border-radius:10px; transition:all .2s; }
        .header-icon:hover { background:rgba(67,56,202,.3); }
        .header-icon svg { width:24px; height:24px; stroke:#c7d2fe; }
        .school-main { display:flex; gap:0; padding:0 12px 12px; }
        .school-sidebar { width:160px; display:flex; flex-direction:column; gap:6px; padding-right:15px; }
        .school-sidebar-item { background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:12px 15px; text-align:center; font-size:13px; font-weight:700; color:#334155; cursor:pointer; text-decoration:none; display:block; transition:all .25s; }
        .school-sidebar-item:hover { background:#eef2ff; color:#4338CA; border-color:#c7d2fe; }
        .school-sidebar-item.active { background:linear-gradient(135deg,#4338CA,#6366f1); color:#fff; border-color:transparent; box-shadow:0 4px 12px rgba(67,56,202,.3); }
        .school-content { flex:1; padding:10px; }
        .stats-circles { display:flex; justify-content:center; gap:40px; margin-bottom:28px; padding:20px 0; }
        .stat-circle { width:130px; height:130px; border-radius:50%; border:3px solid #e0e7ff; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(67,56,202,.1); transition:all .3s; }
        .stat-circle:hover { border-color:#4338CA; transform:translateY(-3px); box-shadow:0 8px 25px rgba(67,56,202,.2); }
        .stat-circle-label { font-size:12px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.5px; }
        .stat-circle-value { font-size:36px; font-weight:800; background:linear-gradient(135deg,#4338CA,#7C3AED); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .content-section { background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:24px; margin-bottom:20px; box-shadow:0 4px 15px rgba(0,0,0,.04); }
        .section-title { font-size:17px; font-weight:700; color:#0F172A; margin-bottom:18px; }
        .quick-access-title { font-size:15px; font-weight:700; color:#0F172A; margin-bottom:15px; padding-left:5px; }
        .quick-access-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:15px; }
        .quick-access-card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; height:110px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; text-decoration:none; color:#334155; gap:8px; transition:all .3s; box-shadow:0 2px 8px rgba(0,0,0,.03); }
        .quick-access-card:hover { background:linear-gradient(135deg,#eef2ff,#f5f3ff); border-color:#c7d2fe; transform:translateY(-3px); box-shadow:0 8px 20px rgba(67,56,202,.1); }
        .quick-access-card svg { width:34px; height:34px; stroke:#4338CA; }
        .quick-access-card span { font-weight:700; font-size:13px; color:#334155; }
        .notification-bell { position:relative; }
        .notification-dot { position:absolute; top:-2px; right:-2px; width:10px; height:10px; background:#ef4444; border-radius:50%; border:2px solid #0F172A; }
        .profile-wrapper { position:relative; }
        .profile-dropdown { display:none; position:absolute; top:50px; right:0; background:#fff; border:1px solid #e2e8f0; border-radius:14px; min-width:160px; box-shadow:0 10px 40px rgba(0,0,0,.15); z-index:1000; overflow:hidden; }
        .profile-dropdown.show { display:block; }
        .profile-dropdown-item { padding:12px 20px; cursor:pointer; font-size:13px; font-weight:600; color:#334155; border-bottom:1px solid #f1f5f9; transition:all .2s; }
        .profile-dropdown-item:last-child { border-bottom:none; }
        .profile-dropdown-item:hover { background:#eef2ff; color:#4338CA; }
        .profile-dropdown-item.logout { color:#dc2626; }
        .profile-dropdown-item.logout:hover { background:#fef2f2; }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .stats-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            flex: 1;
            background-color: #fff;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #000;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="school-header">
        <div class="school-header-left">
            <div class="school-logo" id="schoolLogo">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                    <path d="M3 21h18M3 7v14M21 7v14M6 21V10M18 21V10M9 21V17h6v4M12 7V3l8 4M4 7l8-4"></path>
                </svg>
            </div>
        </div>
        <div class="school-name" id="schoolName">Loading...</div>
        <div class="school-header-right">
            <div class="profile-wrapper">
                <div class="header-icon" id="profileIcon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <div class="profile-dropdown" id="profileDropdown">
                    <div class="profile-dropdown-item" id="profileEmail">Loading...</div>
                    <div class="profile-dropdown-item logout" onclick="logout()">Logout</div>
                </div>
            </div>
        </div>
    </div>

    <div class="school-main">
        <div class="school-sidebar">
            <a href="dashboard.html" class="school-sidebar-item">HOME</a>
            <a href="teachers.html" class="school-sidebar-item">TEACHER</a>
            <a href="students.html" class="school-sidebar-item">STUDENTS</a>
            <a href="pending-students.html" class="school-sidebar-item">PENDING</a>
            <a href="overview.html" class="school-sidebar-item">OVERVIEW</a>
            <a href="plans.html" class="school-sidebar-item">PLANS</a>
            <a href="support.html" class="school-sidebar-item">SUPPORT</a>
            <a href="send-message.html" class="school-sidebar-item">SEND MESSAGE</a>
            <a href="events.html" class="school-sidebar-item">EVENTS</a>
            <a href="exams.html" class="school-sidebar-item active">EXAMS</a>
            <div class="school-sidebar-item" onclick="logout()">LOGOUT</div>
        </div>

        <div class="school-content">
            <div class="page-title">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                Exam Management
            </div>

            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-value" id="totalExams">0</div>
                    <div class="stat-label">Total Exams</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="upcomingExams">0</div>
                    <div class="stat-label">Upcoming</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="completedExams">0</div>
                    <div class="stat-label">Completed</div>
                </div>
            </div>

            <div class="exam-form-card">
                <div class="form-title">📝 Schedule New Exam</div>
                <form id="examForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Exam Name</label>
                            <input type="text" class="form-input" id="examName" placeholder="e.g., Mid-Term Examination"
                                required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Subject</label>
                            <select class="form-select" id="examSubject" required>
                                <option value="">Select Subject</option>
                                <option value="Mathematics">Mathematics</option>
                                <option value="Science">Science</option>
                                <option value="English">English</option>
                                <option value="Hindi">Hindi</option>
                                <option value="Social Studies">Social Studies</option>
                                <option value="Computer">Computer</option>
                                <option value="Physics">Physics</option>
                                <option value="Chemistry">Chemistry</option>
                                <option value="Biology">Biology</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Class</label>
                            <select class="form-select" id="examClass" required>
                                <option value="">Select Class</option>
                                <option value="1">Class 1</option>
                                <option value="2">Class 2</option>
                                <option value="3">Class 3</option>
                                <option value="4">Class 4</option>
                                <option value="5">Class 5</option>
                                <option value="6">Class 6</option>
                                <option value="7">Class 7</option>
                                <option value="8">Class 8</option>
                                <option value="9">Class 9</option>
                                <option value="10">Class 10</option>
                                <option value="11">Class 11</option>
                                <option value="12">Class 12</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Exam Date</label>
                            <input type="date" class="form-input" id="examDate" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Start Time</label>
                            <input type="time" class="form-input" id="examTime" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Duration (minutes)</label>
                            <input type="number" class="form-input" id="examDuration" value="60" min="15" max="300"
                                required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Total Marks</label>
                            <input type="number" class="form-input" id="examMarks" value="100" min="10" max="500"
                                required>
                        </div>
                    </div>
                    <button type="submit" class="btn-schedule">SCHEDULE EXAM</button>
                </form>
            </div>

            <div class="section-header">
                <div class="section-title">Scheduled Exams</div>
                <div class="tabs">
                    <button class="tab-btn active" onclick="filterExams('all')">All</button>
                    <button class="tab-btn" onclick="filterExams('upcoming')">Upcoming</button>
                    <button class="tab-btn" onclick="filterExams('completed')">Completed</button>
                </div>
            </div>

            <div class="exams-table" id="examsTable">
                <table>
                    <thead>
                        <tr>
                            <th>Exam Name</th>
                            <th>Class</th>
                            <th>Subject</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Duration</th>
                            <th>Marks</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="examsBody">
                        <tr>
                            <td colspan="9" class="no-data">Loading exams...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function showToast(message, type) {
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast ' + (type || 'info');
            toast.innerHTML = '<span class="toast-message">' + message + '</span>';
            container.appendChild(toast);
            setTimeout(function () { toast.remove(); }, 3000);
        }

        var allExams = [];
        var currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', function () {
            var token = localStorage.getItem('schoolToken');
            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            loadSchoolData();
            loadExams();
            setupEventListeners();

            // Set min date to today
            var today = new Date().toISOString().split('T')[0];
            document.getElementById('examDate').setAttribute('min', today);
        });

        function setupEventListeners() {
            document.getElementById('profileIcon').addEventListener('click', function (e) {
                e.stopPropagation();
                document.getElementById('profileDropdown').classList.toggle('show');
            });

            document.addEventListener('click', function () {
                document.getElementById('profileDropdown').classList.remove('show');
            });

            document.getElementById('examForm').addEventListener('submit', function (e) {
                e.preventDefault();
                scheduleExam();
            });
        }

        async function loadSchoolData() {
            var token = localStorage.getItem('schoolToken');
            try {
                var response = await fetch('/api/school-auth/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!response.ok) {
                    window.location.href = 'index.html';
                    return;
                }
                var school = await response.json();
                document.getElementById('schoolName').textContent = school.name.toUpperCase();
                document.getElementById('profileEmail').textContent = school.email || 'Profile';
                if (school.logo) {
                    document.getElementById('schoolLogo').innerHTML = '<img src="' + school.logo + '" alt="Logo">';
                }
            } catch (error) {
                console.error('Load school data error:', error);
            }
        }

        async function loadExams() {
            var token = localStorage.getItem('schoolToken');
            var examsBody = document.getElementById('examsBody');

            try {
                var response = await fetch('/api/exams', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                allExams = await response.json();
                updateStats();
                renderExams();
            } catch (error) {
                console.error('Load exams error:', error);
                examsBody.innerHTML = '<tr><td colspan="9" class="no-data">Error loading exams</td></tr>';
            }
        }

        function updateStats() {
            var today = new Date();
            today.setHours(0, 0, 0, 0);

            var total = allExams.length;
            var upcoming = allExams.filter(function (e) {
                return new Date(e.examDate) >= today && e.status === 'Scheduled';
            }).length;
            var completed = allExams.filter(function (e) {
                return e.status === 'Completed';
            }).length;

            document.getElementById('totalExams').textContent = total;
            document.getElementById('upcomingExams').textContent = upcoming;
            document.getElementById('completedExams').textContent = completed;
        }

        function filterExams(filter) {
            currentFilter = filter;
            document.querySelectorAll('.tab-btn').forEach(function (btn) {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderExams();
        }

        function renderExams() {
            var examsBody = document.getElementById('examsBody');
            var today = new Date();
            today.setHours(0, 0, 0, 0);

            var filteredExams = allExams;

            if (currentFilter === 'upcoming') {
                filteredExams = allExams.filter(function (e) {
                    return new Date(e.examDate) >= today && e.status === 'Scheduled';
                });
            } else if (currentFilter === 'completed') {
                filteredExams = allExams.filter(function (e) {
                    return e.status === 'Completed';
                });
            }

            if (filteredExams.length === 0) {
                examsBody.innerHTML = '<tr><td colspan="9" class="no-data">No exams found</td></tr>';
                return;
            }

            examsBody.innerHTML = filteredExams.map(function (exam) {
                var examDate = new Date(exam.examDate).toLocaleDateString('en-IN', {
                    day: '2-digit', month: 'short', year: 'numeric'
                });
                var statusClass = exam.status.toLowerCase();

                return '<tr>' +
                    '<td><strong>' + exam.name + '</strong></td>' +
                    '<td>Class ' + exam.className + '</td>' +
                    '<td>' + exam.subject + '</td>' +
                    '<td>' + examDate + '</td>' +
                    '<td>' + exam.startTime + '</td>' +
                    '<td>' + exam.duration + ' min</td>' +
                    '<td>' + exam.totalMarks + '</td>' +
                    '<td><span class="exam-status ' + statusClass + '">' + exam.status + '</span></td>' +
                    '<td>' +
                    '<button class="action-btn complete" onclick="updateStatus(\'' + exam._id + '\', \'Completed\')">✓</button>' +
                    '<button class="action-btn cancel" onclick="updateStatus(\'' + exam._id + '\', \'Cancelled\')">✕</button>' +
                    '<button class="action-btn delete" onclick="deleteExam(\'' + exam._id + '\')">🗑</button>' +
                    '</td>' +
                    '</tr>';
            }).join('');
        }

        async function scheduleExam() {
            var token = localStorage.getItem('schoolToken');

            var data = {
                name: document.getElementById('examName').value,
                subject: document.getElementById('examSubject').value,
                className: document.getElementById('examClass').value,
                examDate: document.getElementById('examDate').value,
                startTime: document.getElementById('examTime').value,
                duration: parseInt(document.getElementById('examDuration').value),
                totalMarks: parseInt(document.getElementById('examMarks').value)
            };

            if (!data.name || !data.subject || !data.className || !data.examDate || !data.startTime) {
                showToast('Please fill all required fields', 'error');
                return;
            }

            try {
                var response = await fetch('/api/exams', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    showToast('Exam scheduled successfully!', 'success');
                    document.getElementById('examForm').reset();
                    document.getElementById('examDuration').value = '60';
                    document.getElementById('examMarks').value = '100';
                    loadExams();
                } else {
                    var result = await response.json();
                    showToast(result.message || 'Failed to schedule exam', 'error');
                }
            } catch (error) {
                showToast('Error scheduling exam', 'error');
            }
        }

        async function updateStatus(examId, status) {
            var token = localStorage.getItem('schoolToken');

            try {
                var response = await fetch('/api/exams/' + examId + '/status', {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ status })
                });

                if (response.ok) {
                    showToast('Exam marked as ' + status, 'success');
                    loadExams();
                } else {
                    showToast('Failed to update exam', 'error');
                }
            } catch (error) {
                showToast('Error updating exam', 'error');
            }
        }

        async function deleteExam(examId) {
            if (!confirm('Are you sure you want to delete this exam?')) return;

            var token = localStorage.getItem('schoolToken');

            try {
                var response = await fetch('/api/exams/' + examId, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (response.ok) {
                    showToast('Exam deleted successfully', 'success');
                    loadExams();
                } else {
                    showToast('Failed to delete exam', 'error');
                }
            } catch (error) {
                showToast('Error deleting exam', 'error');
            }
        }

        function logout() {
            localStorage.removeItem('schoolToken');
            localStorage.removeItem('schoolData');
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
