<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support - School Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#F1F5F9; }
        .school-header { background:linear-gradient(135deg,#0F172A,#1e293b); border:none; border-radius:16px; margin:12px; padding:16px 28px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 4px 20px rgba(0,0,0,.15); }
        .school-header-left { display:flex; align-items:center; gap:20px; }
        .school-logo { width:48px; height:48px; border-radius:12px; border:none; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; cursor:pointer; transition:all .3s; }
        .school-logo:hover { transform:scale(1.05); }
        .school-logo img { width:100%; height:100%; object-fit:cover; border-radius:12px; }
        .school-logo svg { width:30px; height:30px; stroke:#c7d2fe; }
        .school-name { color:#fff; font-size:24px; font-weight:800; letter-spacing:1px; flex:1; text-align:center; }
        .school-header-right { display:flex; align-items:center; gap:16px; }
        .header-icon { width:40px; height:40px; display:flex; align-items:center; justify-content:center; cursor:pointer; background:rgba(255,255,255,.08); border-radius:10px; transition:all .2s; }
        .header-icon:hover { background:rgba(67,56,202,.3); }
        .header-icon svg { width:24px; height:24px; stroke:#c7d2fe; }
        .school-main { display:flex; gap:0; padding:0 12px 12px; }
        .school-sidebar { width:160px; display:flex; flex-direction:column; gap:6px; padding-right:15px; }
        .school-sidebar-item { background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:12px 15px; text-align:center; font-size:13px; font-weight:700; color:#334155; cursor:pointer; text-decoration:none; display:block; transition:all .25s; }
        .school-sidebar-item:hover { background:#eef2ff; color:#4338CA; border-color:#c7d2fe; }
        .school-sidebar-item.active { background:linear-gradient(135deg,#4338CA,#6366f1); color:#fff; border-color:transparent; box-shadow:0 4px 12px rgba(67,56,202,.3); }
        .school-content { flex:1; padding:10px; }
        .stats-circles { display:flex; justify-content:center; gap:40px; margin-bottom:28px; padding:20px 0; }
        .stat-circle { width:130px; height:130px; border-radius:50%; border:3px solid #e0e7ff; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(67,56,202,.1); transition:all .3s; }
        .stat-circle:hover { border-color:#4338CA; transform:translateY(-3px); box-shadow:0 8px 25px rgba(67,56,202,.2); }
        .stat-circle-label { font-size:12px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.5px; }
        .stat-circle-value { font-size:36px; font-weight:800; background:linear-gradient(135deg,#4338CA,#7C3AED); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .content-section { background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:24px; margin-bottom:20px; box-shadow:0 4px 15px rgba(0,0,0,.04); }
        .section-title { font-size:17px; font-weight:700; color:#0F172A; margin-bottom:18px; }
        .quick-access-title { font-size:15px; font-weight:700; color:#0F172A; margin-bottom:15px; padding-left:5px; }
        .quick-access-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:15px; }
        .quick-access-card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; height:110px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; text-decoration:none; color:#334155; gap:8px; transition:all .3s; box-shadow:0 2px 8px rgba(0,0,0,.03); }
        .quick-access-card:hover { background:linear-gradient(135deg,#eef2ff,#f5f3ff); border-color:#c7d2fe; transform:translateY(-3px); box-shadow:0 8px 20px rgba(67,56,202,.1); }
        .quick-access-card svg { width:34px; height:34px; stroke:#4338CA; }
        .quick-access-card span { font-weight:700; font-size:13px; color:#334155; }
        .notification-bell { position:relative; }
        .notification-dot { position:absolute; top:-2px; right:-2px; width:10px; height:10px; background:#ef4444; border-radius:50%; border:2px solid #0F172A; }
        .profile-wrapper { position:relative; }
        .profile-dropdown { display:none; position:absolute; top:50px; right:0; background:#fff; border:1px solid #e2e8f0; border-radius:14px; min-width:160px; box-shadow:0 10px 40px rgba(0,0,0,.15); z-index:1000; overflow:hidden; }
        .profile-dropdown.show { display:block; }
        .profile-dropdown-item { padding:12px 20px; cursor:pointer; font-size:13px; font-weight:600; color:#334155; border-bottom:1px solid #f1f5f9; transition:all .2s; }
        .profile-dropdown-item:last-child { border-bottom:none; }
        .profile-dropdown-item:hover { background:#eef2ff; color:#4338CA; }
        .profile-dropdown-item.logout { color:#dc2626; }
        .profile-dropdown-item.logout:hover { background:#fef2f2; }

        .history-section {
            margin-top: 20px;
        }

        .history-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            padding: 12px 15px;
            background: #333;
            color: #fff;
            border-radius: 10px;
        }

        .ticket-card {
            background: #fff;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .ticket-subject {
            font-weight: bold;
            font-size: 14px;
        }

        .ticket-status {
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-progress {
            background: #cce5ff;
            color: #004085;
        }

        .status-resolved {
            background: #d4edda;
            color: #155724;
        }

        .ticket-message {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .ticket-date {
            font-size: 11px;
            color: #999;
        }

        .no-tickets {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 14px;
        }

        .ticket-reply {
            background: #e8f5e9;
            border-left: 3px solid #4caf50;
            padding: 10px 12px;
            margin-top: 10px;
            border-radius: 0 8px 8px 0;
            font-size: 13px;
        }

        .reply-label {
            font-weight: bold;
            color: #2e7d32;
            font-size: 11px;
            margin-bottom: 5px;
        }

        .unread-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #000;
            border-radius: 50%;
            margin-left: 5px;
        }

        .new-badge {
            background: #f44336;
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 8px;
        }
    </style>
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="school-header">
        <div class="school-header-left">
            <div class="school-logo" id="schoolLogo">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                    <path d="M3 21h18M3 7v14M21 7v14M6 21V10M18 21V10M9 21V17h6v4M12 7V3l8 4M4 7l8-4"></path>
                </svg>
            </div>
        </div>
        <div class="school-name" id="schoolName">Loading...</div>
        <div class="school-header-right">
            <div class="profile-wrapper">
                <div class="header-icon" id="profileIcon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <div class="profile-dropdown" id="profileDropdown">
                    <div class="profile-dropdown-item" id="profileEmail">Loading...</div>
                    <div class="profile-dropdown-item logout" onclick="logout()">Logout</div>
                </div>
            </div>
        </div>
    </div>

    <div class="school-main">
        <div class="school-sidebar">
            <a href="dashboard.html" class="school-sidebar-item">HOME</a>
            <a href="teachers.html" class="school-sidebar-item">TEACHER</a>
            <a href="students.html" class="school-sidebar-item">STUDENTS</a>
            <a href="pending-students.html" class="school-sidebar-item">PENDING</a>
            <a href="overview.html" class="school-sidebar-item">OVERVIEW</a>
            <a href="plans.html" class="school-sidebar-item">PLANS</a>
            <a href="support.html" class="school-sidebar-item active">SUPPORT<span id="unreadDot" style="display:none;"
                    class="unread-dot"></span></a>
            <a href="send-message.html" class="school-sidebar-item">SEND MESSAGE</a>
            <a href="events.html" class="school-sidebar-item">EVENTS</a>
            <a href="exams.html" class="school-sidebar-item">EXAMS</a>
            <div class="school-sidebar-item" onclick="logout()">LOGOUT</div>
        </div>

        <div class="school-content">
            <div class="support-form-card">
                <form id="supportForm">
                    <div class="form-row">
                        <input type="text" class="form-input" id="subject" placeholder="Subject" required>
                        <select class="form-select" id="category">
                            <option value="">Choose the Option</option>
                            <option value="Technical">Technical Issue</option>
                            <option value="Billing">Billing</option>
                            <option value="Feature">Feature Request</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <textarea class="form-textarea" id="message" placeholder="Write your message here"
                        required></textarea>
                    <button type="submit" class="btn-send">Send Now</button>
                </form>
            </div>

            <!-- Ticket History Section -->
            <div class="history-section">
                <div class="history-title">📋 Your Ticket History</div>
                <div id="ticketHistoryContainer">
                    <div class="no-tickets">Loading...</div>
                </div>
            </div>

            <div class="contact-section">
                <div class="contact-row">
                    <div class="contact-icon">
                        <svg viewBox="0 0 24 24" stroke-width="2">
                            <path
                                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                            </path>
                        </svg>
                    </div>
                    <div class="contact-info">
                        <div class="contact-box" id="phone1">+91 4985754785</div>
                        <div class="contact-box" id="phone2">+91 4985754785</div>
                    </div>
                </div>

                <div class="contact-row">
                    <div class="contact-icon">
                        <svg viewBox="0 0 24 24" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                            </path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                    </div>
                    <div class="contact-info">
                        <div class="contact-box-full" id="email">support.ams@gmail.com</div>
                    </div>
                </div>

                <div class="contact-row">
                    <div class="contact-icon">
                        <svg viewBox="0 0 24 24" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                    </div>
                    <div class="contact-info">
                        <div class="contact-box-full" id="address">Rana tower, Jina Maharashtra, India</div>
                    </div>
                </div>

                <div class="contact-row">
                    <div class="contact-icon">
                        <svg viewBox="0 0 24 24" stroke-width="2">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                        </svg>
                    </div>
                    <div class="contact-info">
                        <div class="contact-box-full" id="instagram">@ATTENDANCEMANAGMENT</div>
                    </div>
                </div>

                <div class="contact-row">
                    <div class="contact-icon">
                        <svg viewBox="0 0 24 24" stroke-width="2" fill="#333">
                            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
                        </svg>
                    </div>
                    <div class="contact-info">
                        <div class="contact-box-full" id="facebook">@ATTENDANCEMANAGMENT</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showToast(message, type) {
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast ' + (type || 'info');
            toast.innerHTML = '<span class="toast-message">' + message + '</span>';
            container.appendChild(toast);
            setTimeout(function () { toast.remove(); }, 3000);
        }

        document.addEventListener('DOMContentLoaded', function () {
            var token = localStorage.getItem('schoolToken');
            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            loadSchoolData();
            loadContactInfo();
            loadTicketHistory();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('profileIcon').addEventListener('click', function (e) {
                e.stopPropagation();
                document.getElementById('profileDropdown').classList.toggle('show');
            });

            document.addEventListener('click', function () {
                document.getElementById('profileDropdown').classList.remove('show');
            });

            document.getElementById('supportForm').addEventListener('submit', function (e) {
                e.preventDefault();
                submitTicket();
            });
        }

        async function loadSchoolData() {
            var token = localStorage.getItem('schoolToken');
            try {
                var response = await fetch('/api/school-auth/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!response.ok) {
                    window.location.href = 'index.html';
                    return;
                }
                var school = await response.json();
                document.getElementById('schoolName').textContent = school.name.toUpperCase();
                document.getElementById('profileEmail').textContent = school.email || 'Profile';
                if (school.logo) {
                    document.getElementById('schoolLogo').innerHTML = '<img src="' + school.logo + '" alt="Logo">';
                }
            } catch (error) {
                console.error('Load school data error:', error);
            }
        }

        async function loadContactInfo() {
            try {
                var response = await fetch('/api/support/contact');
                var contact = await response.json();

                if (contact.phones && contact.phones.length >= 2) {
                    document.getElementById('phone1').textContent = contact.phones[0];
                    document.getElementById('phone2').textContent = contact.phones[1];
                }
                if (contact.email) {
                    document.getElementById('email').textContent = contact.email;
                }
                if (contact.address) {
                    document.getElementById('address').textContent = contact.address;
                }
                if (contact.instagram) {
                    document.getElementById('instagram').textContent = contact.instagram;
                }
                if (contact.facebook) {
                    document.getElementById('facebook').textContent = contact.facebook;
                }
            } catch (error) {
                console.error('Load contact info error:', error);
            }
        }

        async function submitTicket() {
            var token = localStorage.getItem('schoolToken');
            var subject = document.getElementById('subject').value;
            var category = document.getElementById('category').value;
            var message = document.getElementById('message').value;

            if (!subject || !message) {
                showToast('Please fill all fields', 'error');
                return;
            }

            var fullSubject = category ? category + ': ' + subject : subject;

            try {
                var response = await fetch('/api/support/tickets', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ subject: fullSubject, message })
                });

                if (response.ok) {
                    showToast('Support ticket submitted successfully!', 'success');
                    document.getElementById('supportForm').reset();
                    loadTicketHistory();
                } else {
                    var data = await response.json();
                    showToast(data.message || 'Failed to submit ticket', 'error');
                }
            } catch (error) {
                showToast('Error submitting ticket', 'error');
            }
        }

        async function loadTicketHistory() {
            var token = localStorage.getItem('schoolToken');
            var container = document.getElementById('ticketHistoryContainer');

            try {
                var response = await fetch('/api/support/tickets', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (!response.ok) {
                    container.innerHTML = '<div class="no-tickets">Failed to load tickets</div>';
                    return;
                }

                var tickets = await response.json();

                if (tickets.length === 0) {
                    container.innerHTML = '<div class="no-tickets">No tickets submitted yet</div>';
                    return;
                }

                container.innerHTML = tickets.map(function (ticket) {
                    var statusClass = ticket.status === 'Pending' ? 'status-pending' :
                        ticket.status === 'In Progress' ? 'status-progress' : 'status-resolved';
                    var date = new Date(ticket.createdAt).toLocaleDateString();
                    var message = ticket.message.length > 100 ? ticket.message.substring(0, 100) + '...' : ticket.message;

                    var replyHtml = '';
                    if (ticket.reply) {
                        var newBadge = !ticket.isReadBySchool ? '<span class="new-badge">NEW</span>' : '';
                        var replyDate = ticket.repliedAt ? new Date(ticket.repliedAt).toLocaleDateString() : '';
                        replyHtml = '<div class="ticket-reply" onclick="markAsRead(\'' + ticket._id + '\')">' +
                            '<div class="reply-label">📩 Support Reply' + newBadge + '</div>' +
                            '<div>' + ticket.reply + '</div>' +
                            '<div class="ticket-date">Replied: ' + replyDate + '</div>' +
                            '</div>';
                    }

                    return '<div class="ticket-card">' +
                        '<div class="ticket-header">' +
                        '<div class="ticket-subject">' + ticket.subject + '</div>' +
                        '<span class="ticket-status ' + statusClass + '">' + ticket.status + '</span>' +
                        '</div>' +
                        '<div class="ticket-message">' + message + '</div>' +
                        '<div class="ticket-date">Submitted: ' + date + '</div>' +
                        replyHtml +
                        '</div>';
                }).join('');

                checkUnreadCount();
            } catch (error) {
                console.error('Load ticket history error:', error);
                container.innerHTML = '<div class="no-tickets">Error loading tickets</div>';
            }
        }

        async function checkUnreadCount() {
            var token = localStorage.getItem('schoolToken');
            try {
                var response = await fetch('/api/support/unread-count', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (response.ok) {
                    var data = await response.json();
                    var dot = document.getElementById('unreadDot');
                    if (dot) {
                        dot.style.display = data.unreadCount > 0 ? 'inline-block' : 'none';
                    }
                }
            } catch (error) {
                console.error('Check unread count error:', error);
            }
        }

        async function markAsRead(ticketId) {
            var token = localStorage.getItem('schoolToken');
            try {
                await fetch('/api/support/tickets/' + ticketId + '/read', {
                    method: 'PUT',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                loadTicketHistory();
            } catch (error) {
                console.error('Mark as read error:', error);
            }
        }

        function logout() {
            localStorage.removeItem('schoolToken');
            localStorage.removeItem('schoolData');
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
