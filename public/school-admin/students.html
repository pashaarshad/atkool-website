<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - School Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="plan-check.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #c0c0c0;
        }

        .school-header {
            background-color: #333;
            border: 3px solid #000;
            border-radius: 10px;
            margin: 10px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .school-header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .school-logo {
            width: 50px;
            height: 50px;
            background-color: #87CEEB;
            border-radius: 50%;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .school-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .school-logo svg {
            width: 30px;
            height: 30px;
            stroke: #333;
        }

        .school-name {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            flex: 1;
            text-align: center;
        }

        .school-header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .header-icon svg {
            width: 28px;
            height: 28px;
            stroke: #fff;
        }

        .school-main {
            display: flex;
            gap: 0;
            padding: 0 10px 10px 10px;
        }

        .school-sidebar {
            width: 160px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 15px;
        }

        .school-sidebar-item {
            background-color: #fff;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 12px 15px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .school-sidebar-item:hover {
            background-color: #f0f0f0;
        }

        .school-sidebar-item.active {
            background-color: #000;
            color: #fff;
        }

        .school-content {
            flex: 1;
            padding: 10px;
        }

        .page-title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .page-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: bold;
        }

        .page-title svg {
            width: 30px;
            height: 30px;
        }

        .search-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-filters input {
            padding: 10px 15px;
            border: 2px solid #666;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn-add {
            padding: 10px 20px;
            background-color: #000;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-add:hover {
            background-color: #333;
        }

        .students-table {
            width: 100%;
            background-color: #e8e8e8;
            border-radius: 10px;
            overflow: hidden;
        }

        .students-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .students-table th {
            background-color: #d0d0d0;
            padding: 12px 10px;
            text-align: left;
            font-size: 14px;
            font-weight: bold;
            border-bottom: 2px solid #999;
        }

        .students-table td {
            padding: 12px 10px;
            font-size: 14px;
            border-bottom: 1px solid #ccc;
        }

        .students-table tr:nth-child(even) {
            background-color: #f5f5f5;
        }

        .students-table tr:hover {
            background-color: #e0e0e0;
        }

        .action-btn {
            padding: 5px 8px;
            border: 1px solid #999;
            background-color: #fff;
            border-radius: 5px;
            cursor: pointer;
            margin: 2px;
        }

        .action-btn:hover {
            background-color: #f0f0f0;
        }

        .action-btn svg {
            width: 14px;
            height: 14px;
            stroke: #333;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background-color: #fff;
            padding: 30px;
            border-radius: 15px;
            width: 700px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h2 {
            margin-bottom: 20px;
        }

        .students-list {
            margin-top: 15px;
        }

        .student-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        .student-item:hover {
            background-color: #f9f9f9;
        }

        .student-name {
            font-weight: bold;
        }

        .student-info {
            color: #666;
            font-size: 13px;
        }

        .btn-cancel {
            padding: 10px 20px;
            background-color: #fff;
            color: #333;
            border: 2px solid #666;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-cancel:hover {
            background-color: #f0f0f0;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .profile-wrapper {
            position: relative;
        }

        .profile-dropdown {
            display: none;
            position: absolute;
            top: 50px;
            right: 0;
            background-color: #fff;
            border: 2px solid #333;
            border-radius: 10px;
            min-width: 150px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        .profile-dropdown.show {
            display: block;
        }

        .profile-dropdown-item {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #333;
            border-bottom: 1px solid #eee;
        }

        .profile-dropdown-item:last-child {
            border-bottom: none;
        }

        .profile-dropdown-item:hover {
            background-color: #f5f5f5;
        }

        .profile-dropdown-item.logout {
            color: #e74c3c;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 16px;
        }

        .view-details {
            padding: 10px 0;
        }

        .view-detail-row {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .view-detail-label {
            font-weight: bold;
            width: 120px;
            color: #666;
        }

        .view-detail-value {
            flex: 1;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 13px;
            color: #555;
        }

        .form-group select,
        .form-group input {
            width: 100%;
            padding: 9px 12px;
            border: 2px solid #ccc;
            border-radius: 7px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #333;
        }

        .form-row {
            display: flex;
            gap: 12px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .btn-save {
            padding: 10px 20px;
            background-color: #000;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-save:hover { background-color: #333; }
        .btn-save:disabled { background-color: #999; cursor: not-allowed; }
    </style>
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="school-header">
        <div class="school-header-left">
            <div class="school-logo" id="schoolLogo">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                    <path d="M3 21h18M3 7v14M21 7v14M6 21V10M18 21V10M9 21V17h6v4M12 7V3l8 4M4 7l8-4"></path>
                </svg>
            </div>
        </div>
        <div class="school-name" id="schoolName">Loading...</div>
        <div class="school-header-right">
            <div class="profile-wrapper">
                <div class="header-icon" id="profileIcon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <div class="profile-dropdown" id="profileDropdown">
                    <div class="profile-dropdown-item" id="profileEmail">Loading...</div>
                    <div class="profile-dropdown-item logout" onclick="logout()">Logout</div>
                </div>
            </div>
        </div>
    </div>

    <div class="school-main">
        <div class="school-sidebar">
            <a href="dashboard.html" class="school-sidebar-item">HOME</a>
            <a href="teachers.html" class="school-sidebar-item">TEACHER</a>
            <a href="students.html" class="school-sidebar-item active">STUDENTS</a>
            <a href="pending-students.html" class="school-sidebar-item">PENDING</a>
            <a href="overview.html" class="school-sidebar-item">OVERVIEW</a>
            <a href="plans.html" class="school-sidebar-item">PLANS</a>
            <a href="support.html" class="school-sidebar-item">SUPPORT</a>
            <a href="send-message.html" class="school-sidebar-item">SEND MESSAGE</a>
            <a href="events.html" class="school-sidebar-item">EVENTS</a>
            <a href="exams.html" class="school-sidebar-item">EXAMS</a>
            <div class="school-sidebar-item" onclick="logout()">LOGOUT</div>
        </div>

        <div class="school-content">
            <div class="page-title-bar">
                <div class="page-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    Students
                </div>
                <button class="btn-add" onclick="openAddStudentModal()">+ Add Student</button>
            </div>

            <div class="search-filters">
                <input type="text" id="searchTeacher" placeholder="Search by teacher name">
                <input type="text" id="searchClass" placeholder="Search by class">
            </div>

            <div class="students-table">
                <table>
                    <thead>
                        <tr>
                            <th>Id</th>
                            <th>Class</th>
                            <th>Section</th>
                            <th>Students</th>
                            <th>Teacher</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="classesTableBody">
                        <tr>
                            <td colspan="6" style="text-align:center;padding:20px;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addStudentModal">
        <div class="modal">
            <h2>Add Student</h2>
            <div class="form-group">
                <label>Teacher *</label>
                <select id="addTeacherSelect" onchange="onTeacherChange()">
                    <option value="">-- Select Teacher --</option>
                </select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Class *</label>
                    <select id="addClassSelect" onchange="onClassChange()">
                        <option value="">-- Select Class --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Section *</label>
                    <select id="addSectionSelect">
                        <option value="">-- Select Section --</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Student Name *</label>
                <input type="text" id="addStudentName" placeholder="Enter student name">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Roll No</label>
                    <input type="text" id="addRollNo" placeholder="Roll number">
                </div>
                <div class="form-group">
                    <label>Mobile No</label>
                    <input type="text" id="addMobileNo" placeholder="Student mobile">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Parent Name</label>
                    <input type="text" id="addParentName" placeholder="Parent name">
                </div>
                <div class="form-group">
                    <label>Parent Mobile</label>
                    <input type="text" id="addParentMobile" placeholder="Parent mobile">
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeAddStudentModal()">Cancel</button>
                <button type="button" class="btn-save" id="saveStudentBtn" onclick="saveStudent()">Add Student</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="studentsModal">
        <div class="modal">
            <h2 id="modalTitle">Students - Class</h2>
            <div class="students-list" id="studentsList">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        var viewIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';

        function showToast(message, type) {
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast ' + (type || 'info');
            toast.innerHTML = '<span class="toast-message">' + message + '</span>';
            container.appendChild(toast);
            setTimeout(function () { toast.remove(); }, 3000);
        }

        document.addEventListener('DOMContentLoaded', function () {
            var token = localStorage.getItem('schoolToken');
            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            loadSchoolData();
            loadClasses();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('profileIcon').addEventListener('click', function (e) {
                e.stopPropagation();
                document.getElementById('profileDropdown').classList.toggle('show');
            });

            document.addEventListener('click', function () {
                document.getElementById('profileDropdown').classList.remove('show');
            });

            var searchTimeout;
            function debounceSearch() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(loadClasses, 300);
            }

            document.getElementById('searchTeacher').addEventListener('input', debounceSearch);
            document.getElementById('searchClass').addEventListener('input', debounceSearch);
        }

        async function loadSchoolData() {
            var token = localStorage.getItem('schoolToken');
            try {
                var response = await fetch('/api/school-auth/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!response.ok) {
                    window.location.href = 'index.html';
                    return;
                }
                var school = await response.json();
                document.getElementById('schoolName').textContent = school.name.toUpperCase();
                document.getElementById('profileEmail').textContent = school.email || 'Profile';
                if (school.logo) {
                    document.getElementById('schoolLogo').innerHTML = '<img src="' + school.logo + '" alt="Logo">';
                }
            } catch (error) {
                console.error('Load school data error:', error);
            }
        }

        async function loadClasses() {
            var token = localStorage.getItem('schoolToken');
            var tableBody = document.getElementById('classesTableBody');

            var teacherName = document.getElementById('searchTeacher').value;
            var className = document.getElementById('searchClass').value;

            var queryParams = new URLSearchParams();
            if (teacherName) queryParams.append('teacherName', teacherName);
            if (className) queryParams.append('className', className);

            try {
                var response = await fetch('/api/students/classes?' + queryParams.toString(), {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (!response.ok) {
                    tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;">Error loading classes</td></tr>';
                    return;
                }

                var classes = await response.json();

                if (classes.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;">No classes found. Click "Add Dummy Data" to add sample data.</td></tr>';
                    return;
                }

                tableBody.innerHTML = classes.map(function (c, index) {
                    return '<tr>' +
                        '<td>' + (index + 1) + '</td>' +
                        '<td>' + c.className + '</td>' +
                        '<td>' + c.section + '</td>' +
                        '<td>' + c.studentCount + '</td>' +
                        '<td>' + c.teacherName + '</td>' +
                        '<td>' +
                        '<button class="action-btn" onclick="viewStudents(\'' + c.className + '\', \'' + c.section + '\')" title="View Students">' + viewIcon + '</button>' +
                        '</td>' +
                        '</tr>';
                }).join('');

            } catch (error) {
                console.error('Load classes error:', error);
                tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;">Error loading classes</td></tr>';
            }
        }

        async function viewStudents(className, section) {
            var token = localStorage.getItem('schoolToken');
            document.getElementById('modalTitle').textContent = 'Students - ' + className + ' ' + section;

            try {
                var response = await fetch('/api/students?className=' + className + '&section=' + section, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                var students = await response.json();
                var list = document.getElementById('studentsList');

                if (students.length === 0) {
                    list.innerHTML = '<div class="no-data">No students in this class</div>';
                } else {
                    list.innerHTML = students.map(function (s, index) {
                        return '<div class="student-item">' +
                            '<div>' +
                            '<div class="student-name">' + (index + 1) + '. ' + s.name + '</div>' +
                            '<div class="student-info">Roll: ' + (s.rollNo || 'N/A') + ' | Status: ' + s.status + '</div>' +
                            '</div>' +
                            '</div>';
                    }).join('');
                }

                document.getElementById('studentsModal').classList.add('show');
            } catch (error) {
                showToast('Error loading students', 'error');
            }
        }

        function closeModal() {
            document.getElementById('studentsModal').classList.remove('show');
        }

        async function seedDummyData() {
            var token = localStorage.getItem('schoolToken');
            try {
                var response = await fetch('/api/students/seed-dummy', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                var data = await response.json();
                showToast(data.message || 'Dummy data added!', 'success');
                loadClasses();
                loadSchoolData();
            } catch (error) {
                showToast('Error adding dummy data', 'error');
            }
        }

        var allTeachers = []; // cache teachers with classAssignments

        async function openAddStudentModal() {
            var token = localStorage.getItem('schoolToken');
            var select = document.getElementById('addTeacherSelect');
            select.innerHTML = '<option value="">Loading teachers...</option>';
            document.getElementById('addClassSelect').innerHTML = '<option value="">-- Select Class --</option>';
            document.getElementById('addSectionSelect').innerHTML = '<option value="">-- Select Section --</option>';
            document.getElementById('addStudentName').value = '';
            document.getElementById('addRollNo').value = '';
            document.getElementById('addMobileNo').value = '';
            document.getElementById('addParentName').value = '';
            document.getElementById('addParentMobile').value = '';

            try {
                var response = await fetch('/api/teachers', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                allTeachers = await response.json();
                select.innerHTML = '<option value="">-- Select Teacher --</option>' +
                    allTeachers.map(function(t) {
                        return '<option value="' + t._id + '">' + t.name + '</option>';
                    }).join('');
            } catch(e) {
                select.innerHTML = '<option value="">Error loading teachers</option>';
            }

            document.getElementById('addStudentModal').classList.add('show');
        }

        function onTeacherChange() {
            var teacherId = document.getElementById('addTeacherSelect').value;
            var classSelect = document.getElementById('addClassSelect');
            var sectionSelect = document.getElementById('addSectionSelect');
            classSelect.innerHTML = '<option value="">-- Select Class --</option>';
            sectionSelect.innerHTML = '<option value="">-- Select Section --</option>';

            if (!teacherId) return;
            var teacher = allTeachers.find(function(t) { return t._id === teacherId; });
            if (!teacher) return;

            var assignments = teacher.classAssignments || [];
            if (assignments.length > 0) {
                // Populate unique classes from assignments
                var classes = [...new Set(assignments.map(function(a) { return a.className; }))];
                classSelect.innerHTML = '<option value="">-- Select Class --</option>' +
                    classes.map(function(c) { return '<option value="' + c + '">' + c + '</option>'; }).join('');
            } else {
                // No assignments — show all classes 1-12
                classSelect.innerHTML = '<option value="">-- Select Class --</option>' +
                    Array.from({length:12}, function(_,i){ return i+1; })
                        .map(function(n){ return '<option value="'+n+'">Class '+n+'</option>'; }).join('');
            }
        }

        function onClassChange() {
            var teacherId = document.getElementById('addTeacherSelect').value;
            var className = document.getElementById('addClassSelect').value;
            var sectionSelect = document.getElementById('addSectionSelect');
            sectionSelect.innerHTML = '<option value="">-- Select Section --</option>';

            if (!className) return;
            var teacher = allTeachers.find(function(t) { return t._id === teacherId; });
            var assignments = teacher ? (teacher.classAssignments || []) : [];
            var sections = assignments.length > 0
                ? assignments.filter(function(a){ return a.className === className; }).map(function(a){ return a.section; })
                : ['A','B','C','D'];

            sectionSelect.innerHTML = '<option value="">-- Select Section --</option>' +
                sections.map(function(s){ return '<option value="'+s+'">'+s+'</option>'; }).join('');
        }

        async function saveStudent() {
            var teacherId = document.getElementById('addTeacherSelect').value;
            var className = document.getElementById('addClassSelect').value;
            var section = document.getElementById('addSectionSelect').value;
            var name = document.getElementById('addStudentName').value.trim();

            if (!teacherId || !className || !section || !name) {
                showToast('Teacher, class, section and student name are required', 'error');
                return;
            }

            var btn = document.getElementById('saveStudentBtn');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            var token = localStorage.getItem('schoolToken');
            try {
                var response = await fetch('/api/students', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        className: className,
                        section: section,
                        teacherId: teacherId,
                        rollNo: document.getElementById('addRollNo').value.trim(),
                        mobileNo: document.getElementById('addMobileNo').value.trim(),
                        parentName: document.getElementById('addParentName').value.trim(),
                        parentMobile: document.getElementById('addParentMobile').value.trim()
                    })
                });
                var data = await response.json();
                if (response.ok) {
                    showToast('Student added successfully!', 'success');
                    closeAddStudentModal();
                    loadClasses();
                } else {
                    showToast(data.message || 'Error adding student', 'error');
                }
            } catch(e) {
                showToast('Error adding student', 'error');
            }

            btn.disabled = false;
            btn.textContent = 'Add Student';
        }

        function closeAddStudentModal() {
            document.getElementById('addStudentModal').classList.remove('show');
        }

        function logout() {
            localStorage.removeItem('schoolToken');
            localStorage.removeItem('schoolData');
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
