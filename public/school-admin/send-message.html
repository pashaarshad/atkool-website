<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Message - School Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="plan-check.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #c0c0c0;
        }

        .school-header {
            background-color: #333;
            border: 3px solid #000;
            border-radius: 10px;
            margin: 10px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .school-header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .school-logo {
            width: 50px;
            height: 50px;
            background-color: #87CEEB;
            border-radius: 50%;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .school-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .school-logo svg {
            width: 30px;
            height: 30px;
            stroke: #333;
        }

        .school-name {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            flex: 1;
            text-align: center;
        }

        .school-header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .header-icon svg {
            width: 28px;
            height: 28px;
            stroke: #fff;
        }

        .school-main {
            display: flex;
            gap: 0;
            padding: 0 10px 10px 10px;
        }

        .school-sidebar {
            width: 160px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 15px;
        }

        .school-sidebar-item {
            background-color: #fff;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 12px 15px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .school-sidebar-item:hover {
            background-color: #f0f0f0;
        }

        .school-sidebar-item.active {
            background-color: #000;
            color: #fff;
        }

        .school-content {
            flex: 1;
            padding: 10px;
        }

        .btn-history {
            background-color: #fff;
            border: 2px solid #333;
            padding: 12px 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .btn-history:hover {
            background-color: #f0f0f0;
        }

        .message-form-card {
            background-color: #fff;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 30px;
            text-align: left;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
            font-size: 14px;
            color: #333;
            white-space: nowrap;
            text-align: left;
        }

        .form-select {
            width: 100%;
            padding: 12px 15px;
            font-size: 14px;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #fff;
            cursor: pointer;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            font-size: 14px;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #fff;
        }

        .form-textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px 15px;
            font-size: 14px;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #fff;
            resize: vertical;
            font-family: Arial, sans-serif;
        }

        .char-count {
            color: #666;
            font-size: 12px;
            margin-top: 5px;
        }

        .btn-send {
            background-color: #000;
            color: #fff;
            border: none;
            padding: 15px 35px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 10px;
        }

        .btn-send:hover {
            background-color: #333;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background-color: #fff;
            padding: 30px;
            border-radius: 15px;
            width: 700px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h2 {
            margin-bottom: 20px;
        }

        .message-item {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            background-color: #f9f9f9;
        }

        .message-item-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .message-heading {
            font-weight: bold;
            font-size: 16px;
        }

        .message-date {
            color: #666;
            font-size: 12px;
        }

        .message-body {
            color: #333;
            line-height: 1.5;
        }

        .message-sendto {
            color: #666;
            font-size: 12px;
            margin-top: 5px;
        }

        .btn-cancel {
            padding: 10px 20px;
            background-color: #fff;
            color: #333;
            border: 2px solid #666;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-cancel:hover {
            background-color: #f0f0f0;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .profile-wrapper {
            position: relative;
        }

        .profile-dropdown {
            display: none;
            position: absolute;
            top: 50px;
            right: 0;
            background-color: #fff;
            border: 2px solid #333;
            border-radius: 10px;
            min-width: 150px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        .profile-dropdown.show {
            display: block;
        }

        .profile-dropdown-item {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #333;
            border-bottom: 1px solid #eee;
        }

        .profile-dropdown-item:last-child {
            border-bottom: none;
        }

        .profile-dropdown-item:hover {
            background-color: #f5f5f5;
        }

        .profile-dropdown-item.logout {
            color: #e74c3c;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="school-header">
        <div class="school-header-left">
            <div class="school-logo" id="schoolLogo">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                    <path d="M3 21h18M3 7v14M21 7v14M6 21V10M18 21V10M9 21V17h6v4M12 7V3l8 4M4 7l8-4"></path>
                </svg>
            </div>
        </div>
        <div class="school-name" id="schoolName">Loading...</div>
        <div class="school-header-right">
            <div class="profile-wrapper">
                <div class="header-icon" id="profileIcon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <div class="profile-dropdown" id="profileDropdown">
                    <div class="profile-dropdown-item" id="profileEmail">Loading...</div>
                    <div class="profile-dropdown-item logout" onclick="logout()">Logout</div>
                </div>
            </div>
        </div>
    </div>

    <div class="school-main">
        <div class="school-sidebar">
            <a href="dashboard.html" class="school-sidebar-item">HOME</a>
            <a href="teachers.html" class="school-sidebar-item">TEACHER</a>
            <a href="students.html" class="school-sidebar-item">STUDENTS</a>
            <a href="pending-students.html" class="school-sidebar-item">PENDING</a>
            <a href="overview.html" class="school-sidebar-item">OVERVIEW</a>
            <a href="plans.html" class="school-sidebar-item">PLANS</a>
            <a href="support.html" class="school-sidebar-item">SUPPORT</a>
            <a href="send-message.html" class="school-sidebar-item active">SEND MESSAGE</a>
            <a href="events.html" class="school-sidebar-item">EVENTS</a>
            <a href="exams.html" class="school-sidebar-item">EXAMS</a>
            <div class="school-sidebar-item" onclick="logout()">LOGOUT</div>
        </div>

        <div class="school-content">
            <button class="btn-history" onclick="viewHistory()">View History</button>

            <form id="messageForm" class="message-form-card">
                <div class="form-group">
                    <label class="form-label">Send To</label>
                    <select class="form-select" id="sendTo" onchange="toggleTeacherSelect()">
                        <option value="All">Send To All</option>
                        <option value="Teachers">All Teachers</option>
                        <option value="SpecificTeacher">Specific Teacher</option>
                        <option value="Students">Students Only</option>
                    </select>
                </div>

                <div class="form-group" id="teacherSelectGroup" style="display: none;">
                    <label class="form-label">Select Teacher</label>
                    <select class="form-select" id="targetTeacher">
                        <option value="">Loading teachers...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Heading Message (30 Character max)</label>
                    <input type="text" class="form-input" id="heading" maxlength="30" required>
                    <div class="char-count">Character Count: <span id="headingCount">0</span>/30</div>
                </div>

                <div class="form-group">
                    <label class="form-label">Message (Max 180 Characters):</label>
                    <textarea class="form-textarea" id="message" maxlength="180" required></textarea>
                    <div class="char-count">Character Count: <span id="messageCount">0</span>/180</div>
                </div>

                <button type="submit" class="btn-send">Send Message</button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="historyModal">
        <div class="modal">
            <h2>Message History</h2>
            <div id="historyList">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        function showToast(message, type) {
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast ' + (type || 'info');
            toast.innerHTML = '<span class="toast-message">' + message + '</span>';
            container.appendChild(toast);
            setTimeout(function () { toast.remove(); }, 3000);
        }

        document.addEventListener('DOMContentLoaded', function () {
            var token = localStorage.getItem('schoolToken');
            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            loadSchoolData();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('profileIcon').addEventListener('click', function (e) {
                e.stopPropagation();
                document.getElementById('profileDropdown').classList.toggle('show');
            });

            document.addEventListener('click', function () {
                document.getElementById('profileDropdown').classList.remove('show');
            });

            document.getElementById('heading').addEventListener('input', function () {
                document.getElementById('headingCount').textContent = this.value.length;
            });

            document.getElementById('message').addEventListener('input', function () {
                document.getElementById('messageCount').textContent = this.value.length;
            });

            document.getElementById('messageForm').addEventListener('submit', function (e) {
                e.preventDefault();
                sendMessage();
            });
        }

        async function loadSchoolData() {
            var token = localStorage.getItem('schoolToken');
            try {
                var response = await fetch('/api/school-auth/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!response.ok) {
                    window.location.href = 'index.html';
                    return;
                }
                var school = await response.json();
                document.getElementById('schoolName').textContent = school.name.toUpperCase();
                document.getElementById('profileEmail').textContent = school.email || 'Profile';
                if (school.logo) {
                    document.getElementById('schoolLogo').innerHTML = '<img src="' + school.logo + '" alt="Logo">';
                }
            } catch (error) {
                console.error('Load school data error:', error);
            }
        }

        async function sendMessage() {
            var token = localStorage.getItem('schoolToken');
            var sendTo = document.getElementById('sendTo').value;
            var heading = document.getElementById('heading').value;
            var message = document.getElementById('message').value;
            var targetTeacherId = null;

            if (sendTo === 'SpecificTeacher') {
                targetTeacherId = document.getElementById('targetTeacher').value;
                if (!targetTeacherId) {
                    showToast('Please select a teacher', 'error');
                    return;
                }
            }

            if (!heading || !message) {
                showToast('Please fill all fields', 'error');
                return;
            }

            try {
                var response = await fetch('/api/school-messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ sendTo, heading, message, targetTeacherId })
                });

                if (response.ok) {
                    showToast('Message sent successfully!', 'success');
                    document.getElementById('messageForm').reset();
                    document.getElementById('headingCount').textContent = '0';
                    document.getElementById('messageCount').textContent = '0';
                    document.getElementById('teacherSelectGroup').style.display = 'none';
                } else {
                    var data = await response.json();
                    showToast(data.message || 'Failed to send message', 'error');
                }
            } catch (error) {
                showToast('Error sending message', 'error');
            }
        }

        function toggleTeacherSelect() {
            var sendTo = document.getElementById('sendTo').value;
            var teacherGroup = document.getElementById('teacherSelectGroup');
            if (sendTo === 'SpecificTeacher') {
                teacherGroup.style.display = 'block';
                loadTeachers();
            } else {
                teacherGroup.style.display = 'none';
            }
        }

        var teachersLoaded = false;
        async function loadTeachers() {
            if (teachersLoaded) return;

            var token = localStorage.getItem('schoolToken');
            var select = document.getElementById('targetTeacher');

            try {
                var response = await fetch('/api/teachers', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (response.ok) {
                    var teachers = await response.json();
                    select.innerHTML = '<option value="">Select a teacher</option>' +
                        teachers.map(function (t) {
                            return '<option value="' + t._id + '">' + t.name + ' (' + (t.className || 'No Class') + ')</option>';
                        }).join('');
                    teachersLoaded = true;
                }
            } catch (error) {
                console.error('Load teachers error:', error);
                select.innerHTML = '<option value="">Error loading teachers</option>';
            }
        }

        async function viewHistory() {
            var token = localStorage.getItem('schoolToken');
            var historyList = document.getElementById('historyList');

            try {
                var response = await fetch('/api/school-messages', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                var messages = await response.json();

                if (messages.length === 0) {
                    historyList.innerHTML = '<div class="no-data">No messages sent yet</div>';
                } else {
                    historyList.innerHTML = messages.map(function (m) {
                        var date = new Date(m.createdAt).toLocaleDateString('en-IN', {
                            day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
                        });
                        return '<div class="message-item">' +
                            '<div class="message-item-header">' +
                            '<span class="message-heading">' + m.heading + '</span>' +
                            '<span class="message-date">' + date + '</span>' +
                            '</div>' +
                            '<div class="message-body">' + m.message + '</div>' +
                            '<div class="message-sendto">Sent to: ' + m.sendTo + '</div>' +
                            '</div>';
                    }).join('');
                }

                document.getElementById('historyModal').classList.add('show');
            } catch (error) {
                showToast('Error loading history', 'error');
            }
        }

        function closeModal() {
            document.getElementById('historyModal').classList.remove('show');
        }

        function logout() {
            localStorage.removeItem('schoolToken');
            localStorage.removeItem('schoolData');
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
