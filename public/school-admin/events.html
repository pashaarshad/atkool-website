<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - School Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="plan-check.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#F1F5F9; }
        .school-header { background:linear-gradient(135deg,#0F172A,#1e293b); border:none; border-radius:16px; margin:12px; padding:16px 28px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 4px 20px rgba(0,0,0,.15); }
        .school-header-left { display:flex; align-items:center; gap:20px; }
        .school-logo { width:48px; height:48px; border-radius:12px; border:none; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; cursor:pointer; transition:all .3s; }
        .school-logo:hover { transform:scale(1.05); }
        .school-logo img { width:100%; height:100%; object-fit:cover; border-radius:12px; }
        .school-logo svg { width:30px; height:30px; stroke:#c7d2fe; }
        .school-name { color:#fff; font-size:24px; font-weight:800; letter-spacing:1px; flex:1; text-align:center; }
        .school-header-right { display:flex; align-items:center; gap:16px; }
        .header-icon { width:40px; height:40px; display:flex; align-items:center; justify-content:center; cursor:pointer; background:rgba(255,255,255,.08); border-radius:10px; transition:all .2s; }
        .header-icon:hover { background:rgba(67,56,202,.3); }
        .header-icon svg { width:24px; height:24px; stroke:#c7d2fe; }
        .school-main { display:flex; gap:0; padding:0 12px 12px; }
        .school-sidebar { width:160px; display:flex; flex-direction:column; gap:6px; padding-right:15px; }
        .school-sidebar-item { background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:12px 15px; text-align:center; font-size:13px; font-weight:700; color:#334155; cursor:pointer; text-decoration:none; display:block; transition:all .25s; }
        .school-sidebar-item:hover { background:#eef2ff; color:#4338CA; border-color:#c7d2fe; }
        .school-sidebar-item.active { background:linear-gradient(135deg,#4338CA,#6366f1); color:#fff; border-color:transparent; box-shadow:0 4px 12px rgba(67,56,202,.3); }
        .school-content { flex:1; padding:10px; }
        .stats-circles { display:flex; justify-content:center; gap:40px; margin-bottom:28px; padding:20px 0; }
        .stat-circle { width:130px; height:130px; border-radius:50%; border:3px solid #e0e7ff; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(67,56,202,.1); transition:all .3s; }
        .stat-circle:hover { border-color:#4338CA; transform:translateY(-3px); box-shadow:0 8px 25px rgba(67,56,202,.2); }
        .stat-circle-label { font-size:12px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.5px; }
        .stat-circle-value { font-size:36px; font-weight:800; background:linear-gradient(135deg,#4338CA,#7C3AED); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .content-section { background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:24px; margin-bottom:20px; box-shadow:0 4px 15px rgba(0,0,0,.04); }
        .section-title { font-size:17px; font-weight:700; color:#0F172A; margin-bottom:18px; }
        .quick-access-title { font-size:15px; font-weight:700; color:#0F172A; margin-bottom:15px; padding-left:5px; }
        .quick-access-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:15px; }
        .quick-access-card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; height:110px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; text-decoration:none; color:#334155; gap:8px; transition:all .3s; box-shadow:0 2px 8px rgba(0,0,0,.03); }
        .quick-access-card:hover { background:linear-gradient(135deg,#eef2ff,#f5f3ff); border-color:#c7d2fe; transform:translateY(-3px); box-shadow:0 8px 20px rgba(67,56,202,.1); }
        .quick-access-card svg { width:34px; height:34px; stroke:#4338CA; }
        .quick-access-card span { font-weight:700; font-size:13px; color:#334155; }
        .notification-bell { position:relative; }
        .notification-dot { position:absolute; top:-2px; right:-2px; width:10px; height:10px; background:#ef4444; border-radius:50%; border:2px solid #0F172A; }
        .profile-wrapper { position:relative; }
        .profile-dropdown { display:none; position:absolute; top:50px; right:0; background:#fff; border:1px solid #e2e8f0; border-radius:14px; min-width:160px; box-shadow:0 10px 40px rgba(0,0,0,.15); z-index:1000; overflow:hidden; }
        .profile-dropdown.show { display:block; }
        .profile-dropdown-item { padding:12px 20px; cursor:pointer; font-size:13px; font-weight:600; color:#334155; border-bottom:1px solid #f1f5f9; transition:all .2s; }
        .profile-dropdown-item:last-child { border-bottom:none; }
        .profile-dropdown-item:hover { background:#eef2ff; color:#4338CA; }
        .profile-dropdown-item.logout { color:#dc2626; }
        .profile-dropdown-item.logout:hover { background:#fef2f2; }

        .no-data {
            text-align: center;
            padding: 40px;
            color:#64748b;
        }

        .upload-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .upload-hint {
            font-size: 11px;
            color:#94a3b8;
            margin-left: 5px;
        }

        .image-preview-container {
            display: none;
            margin-top: 10px;
            padding: 10px;
            border:2px dashed #c7d2fe;
            border-radius: 8px;
            background:#f8fafc;
            max-width: 300px;
        }

        .image-preview-container.show {
            display: block;
        }

        .image-preview-container img {
            max-width: 100%;
            max-height: 150px;
            border-radius: 6px;
            display: block;
        }

        .image-preview-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            font-size: 12px;
            color: #666;
        }

        .remove-image {
            color: #dc3545;
            cursor: pointer;
            font-weight: bold;
        }

        .remove-image:hover {
            text-decoration: underline;
        }
    
        /* ===== PAGE TITLE BAR ===== */
        .page-title-bar { display:flex; justify-content:space-between; align-items:center; background:#fff; border:1px solid #e2e8f0; border-radius:14px; padding:16px 22px; margin-bottom:18px; box-shadow:0 2px 8px rgba(0,0,0,.03); }
        .page-title { display:flex; align-items:center; gap:10px; font-size:18px; font-weight:700; color:#0F172A; }
        .page-title svg { width:26px; height:26px; stroke:#4338CA; flex-shrink:0; }

        /* ===== TABLES (school-admin specific) ===== */
        .teachers-table, .students-table { width:100%; background:#fff; border:1px solid #e2e8f0; border-radius:14px; overflow:hidden; box-shadow:0 4px 15px rgba(0,0,0,.04); }
        .teachers-table table, .students-table table { width:100%; border-collapse:collapse; }
        .teachers-table th, .students-table th { background:linear-gradient(135deg,#0F172A,#1e293b); padding:14px 14px; text-align:left; font-size:12px; font-weight:700; color:#fff; text-transform:uppercase; letter-spacing:.5px; }
        .teachers-table td, .students-table td { padding:12px 14px; font-size:13px; border-bottom:1px solid #f1f5f9; color:#334155; }
        .teachers-table tr:hover, .students-table tr:hover { background:linear-gradient(135deg,#faf5ff,#eef2ff); }

        /* ===== SEARCH FILTERS ===== */
        .search-filters { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
        .search-filters input, .search-filters select { padding:10px 16px; border:2px solid #e2e8f0; border-radius:10px; font-size:13px; background:#fff; transition:all .3s; flex:1; min-width:150px; }
        .search-filters input:focus, .search-filters select:focus { outline:none; border-color:#4338CA; box-shadow:0 0 0 4px rgba(67,56,202,.08); }

        /* ===== ACTION BUTTONS ===== */
        .btn-add { padding:10px 22px; background:linear-gradient(135deg,#4338CA,#6366f1); color:#fff; border:none; border-radius:10px; font-weight:700; font-size:13px; cursor:pointer; transition:all .3s; box-shadow:0 4px 12px rgba(67,56,202,.25); }
        .btn-add:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(67,56,202,.35); }
        .btn-approve { padding:6px 14px; background:linear-gradient(135deg,#10b981,#059669); color:#fff; border:none; border-radius:8px; font-weight:700; font-size:12px; cursor:pointer; transition:all .2s; }
        .btn-approve:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(16,185,129,.3); }
        .btn-reject { padding:6px 14px; background:linear-gradient(135deg,#ef4444,#dc2626); color:#fff; border:none; border-radius:8px; font-weight:700; font-size:12px; cursor:pointer; transition:all .2s; margin-left:6px; }
        .btn-reject:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(239,68,68,.3); }
        .pending-count { background:linear-gradient(135deg,#ef4444,#dc2626); color:#fff; padding:4px 12px; border-radius:20px; font-size:13px; font-weight:700; margin-left:8px; }

        /* ===== QUICK ACTIONS ===== */
        .quick-actions { display:flex; gap:10px; flex-wrap:wrap; }
        .quick-action-btn { display:flex; align-items:center; gap:8px; padding:12px 18px; background:#fff; border:1px solid #e2e8f0; border-radius:12px; font-size:13px; font-weight:700; color:#334155; cursor:pointer; transition:all .25s; }
        .quick-action-btn:hover { background:linear-gradient(135deg,#eef2ff,#f5f3ff); border-color:#c7d2fe; color:#4338CA; transform:translateY(-2px); box-shadow:0 6px 15px rgba(67,56,202,.1); }
        .quick-action-btn svg { width:18px; height:18px; stroke-width:2; }

        /* ===== STUDENT ITEMS (modal list) ===== */
        .student-item { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-bottom:1px solid #f1f5f9; }
        .student-item:last-child { border-bottom:none; }
        .student-name { font-weight:700; font-size:14px; color:#0F172A; }
        .student-info { font-size:12px; color:#64748b; margin-top:2px; }
        .students-list { max-height:400px; overflow-y:auto; }

        /* ===== TOAST (page-level override) ===== */
        .toast-container { position:fixed; top:20px; right:20px; z-index:9999; }
        .toast { padding:15px 25px; border-radius:12px; margin-bottom:10px; color:#fff; font-weight:700; animation:slideIn .3s ease; box-shadow:0 4px 15px rgba(0,0,0,.15); }
        .toast.success { background:linear-gradient(135deg,#10b981,#059669); }
        .toast.error { background:linear-gradient(135deg,#ef4444,#dc2626); }
        @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
    
        /* ===== EVENT CARDS ===== */
        .event-card { background:#fff; border:1px solid #e2e8f0; border-radius:14px; padding:16px; margin-bottom:14px; transition:all .3s; box-shadow:0 2px 8px rgba(0,0,0,.03); display:flex; align-items:center; gap:16px; }
        .event-card:hover { border-color:#c7d2fe; box-shadow:0 6px 20px rgba(67,56,202,.1); }
        .event-image { width:80px; height:60px; border-radius:10px; overflow:hidden; background:#f1f5f9; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .event-image img { width:100%; height:100%; object-fit:cover; }
        .event-image svg { width:30px; height:30px; stroke:#94a3b8; }
        .event-info { flex:1; }
        .event-name { font-size:15px; font-weight:700; color:#0F172A; margin-bottom:4px; }
        .event-description { font-size:13px; color:#475569; line-height:1.5; margin-bottom:4px; }
        .event-meta { font-size:11px; color:#94a3b8; font-weight:500; }
        .event-status { padding:5px 12px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; flex-shrink:0; }
        .event-status.active, .event-status.upcoming { background:#d1fae5; color:#059669; }
        .event-status.completed { background:#dbeafe; color:#2563eb; }
        .event-status.cancelled { background:#fee2e2; color:#dc2626; }
        .events-grid { display:grid; gap:14px; }
        .no-events { text-align:center; padding:40px; color:#64748b; font-size:14px; }

        /* ===== EVENT FORM ===== */
        .event-form-card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:24px; margin-bottom:20px; box-shadow:0 4px 15px rgba(0,0,0,.04); }
        .event-form-card .form-row { display:flex; gap:12px; margin:14px 0; align-items:flex-start; }
        .event-form-card .form-input { width:100%; padding:12px 16px; border:2px solid #e2e8f0; border-radius:10px; font-size:14px; background:#f8fafc; transition:all .3s; font-family:'Inter',sans-serif; box-sizing:border-box; }
        .event-form-card .form-input:focus { outline:none; border-color:#4338CA; box-shadow:0 0 0 4px rgba(67,56,202,.08); background:#fff; }
        .form-select { padding:12px 16px; border:2px solid #e2e8f0; border-radius:10px; font-size:14px; background:#fff; cursor:pointer; transition:all .3s; font-family:'Inter',sans-serif; min-width:150px; }
        .form-select:focus { outline:none; border-color:#4338CA; box-shadow:0 0 0 4px rgba(67,56,202,.08); }
        .form-textarea { width:100%; min-height:100px; padding:14px 16px; border:2px solid #e2e8f0; border-radius:10px; font-size:14px; background:#f8fafc; resize:vertical; font-family:'Inter',sans-serif; transition:all .3s; box-sizing:border-box; }
        .form-textarea:focus { outline:none; border-color:#4338CA; box-shadow:0 0 0 4px rgba(67,56,202,.08); background:#fff; }
        .btn-create { width:100%; padding:14px; background:linear-gradient(135deg,#4338CA,#6366f1); color:#fff; border:none; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; transition:all .3s; box-shadow:0 4px 15px rgba(67,56,202,.25); margin-top:10px; }
        .btn-create:hover { transform:translateY(-2px); box-shadow:0 6px 25px rgba(67,56,202,.35); }
        .btn-manage { padding:8px 18px; background:linear-gradient(135deg,#4338CA,#6366f1); color:#fff; border:none; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; transition:all .3s; margin-left:auto; float:right; }
        .btn-manage:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(67,56,202,.3); }
        .upload-btn { display:inline-flex; align-items:center; gap:8px; padding:10px 18px; background:linear-gradient(135deg,#eef2ff,#e0e7ff); color:#4338CA; border:2px solid #c7d2fe; border-radius:10px; cursor:pointer; font-size:13px; font-weight:700; transition:all .3s; }
        .upload-btn:hover { background:#e0e7ff; border-color:#4338CA; }
        .upload-btn svg { width:18px; height:18px; stroke:#4338CA; }

        /* ===== MANAGE EVENTS ===== */
        .manage-event-item { display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid #f1f5f9; }
        .manage-event-item:last-child { border-bottom:none; }
        .manage-event-name { font-weight:700; font-size:14px; color:#0F172A; margin-bottom:4px; }
        .manage-event-actions { display:flex; gap:6px; }
        .manage-event-actions .action-btn { padding:6px 14px; border:none; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; transition:all .2s; color:#fff; }
        .manage-event-actions .action-btn.complete { background:linear-gradient(135deg,#10b981,#059669); }
        .manage-event-actions .action-btn.cancel { background:linear-gradient(135deg,#f59e0b,#d97706); }
        .manage-event-actions .action-btn.delete { background:linear-gradient(135deg,#ef4444,#dc2626); }
        .manage-event-actions .action-btn:hover { transform:translateY(-1px); box-shadow:0 3px 10px rgba(0,0,0,.2); }

    
        /* ===== MODALS ===== */
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,.6); backdrop-filter:blur(4px); z-index:2000; align-items:center; justify-content:center; }
        .modal-overlay.show { display:flex; }
        .modal { background:#fff; border-radius:18px; width:90%; max-width:600px; max-height:80vh; overflow-y:auto; padding:28px; box-shadow:0 20px 60px rgba(0,0,0,.2); }
        .modal h2 { font-size:20px; font-weight:800; color:#0F172A; margin-bottom:20px; }
        .modal-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:20px; padding-top:16px; border-top:1px solid #f1f5f9; }
        .btn-cancel { padding:10px 24px; background:#f1f5f9; color:#475569; border:1px solid #e2e8f0; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; transition:all .2s; }
        .btn-cancel:hover { background:#e2e8f0; }
        .btn-save { padding:10px 24px; background:linear-gradient(135deg,#4338CA,#6366f1); color:#fff; border:none; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; transition:all .2s; box-shadow:0 4px 12px rgba(67,56,202,.25); }
        .btn-save:hover { transform:translateY(-1px); box-shadow:0 6px 18px rgba(67,56,202,.35); }

    </style>
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="school-header">
        <div class="school-header-left">
            <div class="school-logo" id="schoolLogo">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                    <path d="M3 21h18M3 7v14M21 7v14M6 21V10M18 21V10M9 21V17h6v4M12 7V3l8 4M4 7l8-4"></path>
                </svg>
            </div>
        </div>
        <div class="school-name" id="schoolName">Loading...</div>
        <div class="school-header-right">
            <div class="profile-wrapper">
                <div class="header-icon" id="profileIcon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <div class="profile-dropdown" id="profileDropdown">
                    <div class="profile-dropdown-item" id="profileEmail">Loading...</div>
                    <div class="profile-dropdown-item logout" onclick="logout()">Logout</div>
                </div>
            </div>
        </div>
    </div>

    <div class="school-main">
        <div class="school-sidebar">
            <a href="dashboard.html" class="school-sidebar-item">HOME</a>
            <a href="teachers.html" class="school-sidebar-item">TEACHER</a>
            <a href="students.html" class="school-sidebar-item">STUDENTS</a>
            <a href="pending-students.html" class="school-sidebar-item">PENDING</a>
            <a href="overview.html" class="school-sidebar-item">OVERVIEW</a>
            <a href="plans.html" class="school-sidebar-item">PLANS</a>
            <a href="support.html" class="school-sidebar-item">SUPPORT</a>
            <a href="send-message.html" class="school-sidebar-item">SEND MESSAGE</a>
            <a href="events.html" class="school-sidebar-item active">EVENTS</a>
            <a href="exams.html" class="school-sidebar-item">EXAMS</a>
            <div class="school-sidebar-item" onclick="logout()">LOGOUT</div>
        </div>

        <div class="school-content">
            <div class="event-form-card">
                <form id="eventForm">
                    <input type="text" class="form-input" id="eventName" placeholder="Enter event name here" required>
                    <div class="form-row">
                        <div class="upload-section">
                            <div style="display: flex; align-items: center;">
                                <label class="upload-btn">
                                    <input type="file" id="eventImage" accept="image/*" style="display:none;"
                                        onchange="previewImage(this)">
                                    Upload img
                                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                        <polyline points="17 8 12 3 7 8"></polyline>
                                        <line x1="12" y1="3" x2="12" y2="15"></line>
                                    </svg>
                                </label>
                                <span class="upload-hint">Recommended: 16:9 ratio (e.g. 1920x1080)</span>
                            </div>
                            <div class="image-preview-container" id="imagePreviewContainer">
                                <img id="imagePreview" src="" alt="Preview">
                                <div class="image-preview-info">
                                    <span id="imageFileName"></span>
                                    <span class="remove-image" onclick="removeImage()">Remove</span>
                                </div>
                            </div>
                        </div>
                        <select class="form-select" id="eventFor">
                            <option value="">Event For</option>
                            <option value="All">All</option>
                            <option value="Teachers">Teachers</option>
                            <option value="Students">Students</option>
                        </select>
                    </div>
                    <textarea class="form-textarea" id="eventDescription" placeholder="Enter event description here..."
                        required></textarea>
                    <button type="submit" class="btn-create">CREATE NOW</button>
                </form>
            </div>

            <div class="section-title">
                <span>Events</span>
                <button class="btn-manage" onclick="openManageModal()">Manage</button>
            </div>

            <div class="events-list" id="eventsList">
                <div class="no-data">Loading events...</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="manageModal">
        <div class="modal">
            <h2>Manage Events</h2>
            <div id="manageEventsList"></div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        function showToast(message, type) {
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast ' + (type || 'info');
            toast.innerHTML = '<span class="toast-message">' + message + '</span>';
            container.appendChild(toast);
            setTimeout(function () { toast.remove(); }, 3000);
        }

        var allEvents = [];

        document.addEventListener('DOMContentLoaded', function () {
            var token = localStorage.getItem('schoolToken');
            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            loadSchoolData();
            loadEvents();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('profileIcon').addEventListener('click', function (e) {
                e.stopPropagation();
                document.getElementById('profileDropdown').classList.toggle('show');
            });

            document.addEventListener('click', function () {
                document.getElementById('profileDropdown').classList.remove('show');
            });

            document.getElementById('eventForm').addEventListener('submit', function (e) {
                e.preventDefault();
                createEvent();
            });
        }

        function previewImage(input) {
            var previewContainer = document.getElementById('imagePreviewContainer');
            var previewImg = document.getElementById('imagePreview');
            var fileName = document.getElementById('imageFileName');

            if (input.files && input.files[0]) {
                var file = input.files[0];
                var reader = new FileReader();

                reader.onload = function (e) {
                    previewImg.src = e.target.result;
                    fileName.textContent = file.name.length > 20 ? file.name.substring(0, 17) + '...' : file.name;
                    previewContainer.classList.add('show');
                };

                reader.readAsDataURL(file);
            }
        }

        function removeImage() {
            document.getElementById('eventImage').value = '';
            document.getElementById('imagePreviewContainer').classList.remove('show');
            document.getElementById('imagePreview').src = '';
            document.getElementById('imageFileName').textContent = '';
        }

        async function loadSchoolData() {
            var token = localStorage.getItem('schoolToken');
            try {
                var response = await fetch('/api/school-auth/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!response.ok) {
                    window.location.href = 'index.html';
                    return;
                }
                var school = await response.json();
                document.getElementById('schoolName').textContent = school.name.toUpperCase();
                document.getElementById('profileEmail').textContent = school.email || 'Profile';
                if (school.logo) {
                    document.getElementById('schoolLogo').innerHTML = '<img src="' + school.logo + '" alt="Logo">';
                }
            } catch (error) {
                console.error('Load school data error:', error);
            }
        }

        async function loadEvents() {
            var token = localStorage.getItem('schoolToken');
            var eventsList = document.getElementById('eventsList');

            try {
                var response = await fetch('/api/events', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                allEvents = await response.json();

                if (allEvents.length === 0) {
                    eventsList.innerHTML = '<div class="no-data">No events yet. Create your first event!</div>';
                    return;
                }

                eventsList.innerHTML = allEvents.map(function (event) {
                    var statusClass = event.status.toLowerCase();
                    var date = new Date(event.createdAt).toLocaleDateString('en-IN', {
                        day: '2-digit', month: 'short', year: 'numeric'
                    });
                    return '<div class="event-card">' +
                        '<div class="event-image">' +
                        (event.image ? '<img src="' + event.image + '" alt="Event">' :
                            '<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>') +
                        '</div>' +
                        '<div class="event-info">' +
                        '<div class="event-name">' + event.name + '</div>' +
                        '<div class="event-description">' + event.description.substring(0, 80) + (event.description.length > 80 ? '...' : '') + '</div>' +
                        '<div class="event-meta">For: ' + event.eventFor + ' | ' + date + '</div>' +
                        '</div>' +
                        '<span class="event-status ' + statusClass + '">' + event.status + '</span>' +
                        '</div>';
                }).join('');
            } catch (error) {
                console.error('Load events error:', error);
                eventsList.innerHTML = '<div class="no-data">Error loading events</div>';
            }
        }

        async function createEvent() {
            var token = localStorage.getItem('schoolToken');
            var name = document.getElementById('eventName').value;
            var description = document.getElementById('eventDescription').value;
            var eventFor = document.getElementById('eventFor').value || 'All';
            var imageFile = document.getElementById('eventImage').files[0];

            if (!name || !description) {
                showToast('Please fill all fields', 'error');
                return;
            }

            var image = null;

            // Convert image to Base64 if selected
            if (imageFile) {
                try {
                    image = await new Promise(function (resolve, reject) {
                        var reader = new FileReader();
                        reader.onload = function () { resolve(reader.result); };
                        reader.onerror = function () { reject(reader.error); };
                        reader.readAsDataURL(imageFile);
                    });
                } catch (err) {
                    console.error('Image read error:', err);
                    showToast('Error reading image', 'error');
                    return;
                }
            }

            try {
                var response = await fetch('/api/events', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ name, description, eventFor, image })
                });

                if (response.ok) {
                    showToast('Event created successfully!', 'success');
                    document.getElementById('eventForm').reset();
                    loadEvents();
                } else {
                    var data = await response.json();
                    showToast(data.message || 'Failed to create event', 'error');
                }
            } catch (error) {
                showToast('Error creating event', 'error');
            }
        }

        function openManageModal() {
            var manageList = document.getElementById('manageEventsList');

            if (allEvents.length === 0) {
                manageList.innerHTML = '<div class="no-data">No events to manage</div>';
            } else {
                manageList.innerHTML = allEvents.map(function (event) {
                    return '<div class="manage-event-item">' +
                        '<div>' +
                        '<div class="manage-event-name">' + event.name + '</div>' +
                        '<small style="color:#64748b;">Status: ' + event.status + '</small>' +
                        '</div>' +
                        '<div class="manage-event-actions">' +
                        '<button class="action-btn complete" onclick="updateEventStatus(\'' + event._id + '\', \'Completed\')">Complete</button>' +
                        '<button class="action-btn cancel" onclick="updateEventStatus(\'' + event._id + '\', \'Cancelled\')">Cancel</button>' +
                        '<button class="action-btn delete" onclick="deleteEvent(\'' + event._id + '\')">Delete</button>' +
                        '</div>' +
                        '</div>';
                }).join('');
            }

            document.getElementById('manageModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('manageModal').classList.remove('show');
        }

        async function updateEventStatus(eventId, status) {
            var token = localStorage.getItem('schoolToken');

            try {
                var response = await fetch('/api/events/' + eventId + '/status', {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ status })
                });

                if (response.ok) {
                    showToast('Event marked as ' + status, 'success');
                    loadEvents();
                    closeModal();
                } else {
                    showToast('Failed to update event', 'error');
                }
            } catch (error) {
                showToast('Error updating event', 'error');
            }
        }

        async function deleteEvent(eventId) {
            if (!confirm('Are you sure you want to delete this event?')) return;

            var token = localStorage.getItem('schoolToken');

            try {
                var response = await fetch('/api/events/' + eventId, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (response.ok) {
                    showToast('Event deleted successfully', 'success');
                    loadEvents();
                    closeModal();
                } else {
                    showToast('Failed to delete event', 'error');
                }
            } catch (error) {
                showToast('Error deleting event', 'error');
            }
        }

        function logout() {
            localStorage.removeItem('schoolToken');
            localStorage.removeItem('schoolData');
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
