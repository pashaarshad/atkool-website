<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Students - School Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="plan-check.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#F1F5F9; }
        .school-header { background:linear-gradient(135deg,#0F172A,#1e293b); border:none; border-radius:16px; margin:12px; padding:16px 28px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 4px 20px rgba(0,0,0,.15); }
        .school-header-left { display:flex; align-items:center; gap:20px; }
        .school-logo { width:48px; height:48px; border-radius:12px; border:none; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; cursor:pointer; transition:all .3s; }
        .school-logo:hover { transform:scale(1.05); }
        .school-logo img { width:100%; height:100%; object-fit:cover; border-radius:12px; }
        .school-logo svg { width:30px; height:30px; stroke:#c7d2fe; }
        .school-name { color:#fff; font-size:24px; font-weight:800; letter-spacing:1px; flex:1; text-align:center; }
        .school-header-right { display:flex; align-items:center; gap:16px; }
        .header-icon { width:40px; height:40px; display:flex; align-items:center; justify-content:center; cursor:pointer; background:rgba(255,255,255,.08); border-radius:10px; transition:all .2s; }
        .header-icon:hover { background:rgba(67,56,202,.3); }
        .header-icon svg { width:24px; height:24px; stroke:#c7d2fe; }
        .school-main { display:flex; gap:0; padding:0 12px 12px; }
        .school-sidebar { width:160px; display:flex; flex-direction:column; gap:6px; padding-right:15px; }
        .school-sidebar-item { background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:12px 15px; text-align:center; font-size:13px; font-weight:700; color:#334155; cursor:pointer; text-decoration:none; display:block; transition:all .25s; }
        .school-sidebar-item:hover { background:#eef2ff; color:#4338CA; border-color:#c7d2fe; }
        .school-sidebar-item.active { background:linear-gradient(135deg,#4338CA,#6366f1); color:#fff; border-color:transparent; box-shadow:0 4px 12px rgba(67,56,202,.3); }
        .school-content { flex:1; padding:10px; }
        .stats-circles { display:flex; justify-content:center; gap:40px; margin-bottom:28px; padding:20px 0; }
        .stat-circle { width:130px; height:130px; border-radius:50%; border:3px solid #e0e7ff; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(67,56,202,.1); transition:all .3s; }
        .stat-circle:hover { border-color:#4338CA; transform:translateY(-3px); box-shadow:0 8px 25px rgba(67,56,202,.2); }
        .stat-circle-label { font-size:12px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.5px; }
        .stat-circle-value { font-size:36px; font-weight:800; background:linear-gradient(135deg,#4338CA,#7C3AED); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .content-section { background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:24px; margin-bottom:20px; box-shadow:0 4px 15px rgba(0,0,0,.04); }
        .section-title { font-size:17px; font-weight:700; color:#0F172A; margin-bottom:18px; }
        .quick-access-title { font-size:15px; font-weight:700; color:#0F172A; margin-bottom:15px; padding-left:5px; }
        .quick-access-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:15px; }
        .quick-access-card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; height:110px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; text-decoration:none; color:#334155; gap:8px; transition:all .3s; box-shadow:0 2px 8px rgba(0,0,0,.03); }
        .quick-access-card:hover { background:linear-gradient(135deg,#eef2ff,#f5f3ff); border-color:#c7d2fe; transform:translateY(-3px); box-shadow:0 8px 20px rgba(67,56,202,.1); }
        .quick-access-card svg { width:34px; height:34px; stroke:#4338CA; }
        .quick-access-card span { font-weight:700; font-size:13px; color:#334155; }
        .notification-bell { position:relative; }
        .notification-dot { position:absolute; top:-2px; right:-2px; width:10px; height:10px; background:#ef4444; border-radius:50%; border:2px solid #0F172A; }
        .profile-wrapper { position:relative; }
        .profile-dropdown { display:none; position:absolute; top:50px; right:0; background:#fff; border:1px solid #e2e8f0; border-radius:14px; min-width:160px; box-shadow:0 10px 40px rgba(0,0,0,.15); z-index:1000; overflow:hidden; }
        .profile-dropdown.show { display:block; }
        .profile-dropdown-item { padding:12px 20px; cursor:pointer; font-size:13px; font-weight:600; color:#334155; border-bottom:1px solid #f1f5f9; transition:all .2s; }
        .profile-dropdown-item:last-child { border-bottom:none; }
        .profile-dropdown-item:hover { background:#eef2ff; color:#4338CA; }
        .profile-dropdown-item.logout { color:#dc2626; }
        .profile-dropdown-item.logout:hover { background:#fef2f2; }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 16px;
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            padding: 15px 25px;
            border-radius: 8px;
            margin-bottom: 10px;
            color: #fff;
            font-weight: bold;
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            background-color: #27ae60;
        }

        .toast.error {
            background-color: #e74c3c;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    
        /* ===== PAGE TITLE BAR ===== */
        .page-title-bar { display:flex; justify-content:space-between; align-items:center; background:#fff; border:1px solid #e2e8f0; border-radius:14px; padding:16px 22px; margin-bottom:18px; box-shadow:0 2px 8px rgba(0,0,0,.03); }
        .page-title { display:flex; align-items:center; gap:10px; font-size:18px; font-weight:700; color:#0F172A; }
        .page-title svg { width:26px; height:26px; stroke:#4338CA; flex-shrink:0; }

        /* ===== TABLES (school-admin specific) ===== */
        .teachers-table, .students-table { width:100%; background:#fff; border:1px solid #e2e8f0; border-radius:14px; overflow:hidden; box-shadow:0 4px 15px rgba(0,0,0,.04); }
        .teachers-table table, .students-table table { width:100%; border-collapse:collapse; }
        .teachers-table th, .students-table th { background:linear-gradient(135deg,#0F172A,#1e293b); padding:14px 14px; text-align:left; font-size:12px; font-weight:700; color:#fff; text-transform:uppercase; letter-spacing:.5px; }
        .teachers-table td, .students-table td { padding:12px 14px; font-size:13px; border-bottom:1px solid #f1f5f9; color:#334155; }
        .teachers-table tr:hover, .students-table tr:hover { background:linear-gradient(135deg,#faf5ff,#eef2ff); }

        /* ===== SEARCH FILTERS ===== */
        .search-filters { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
        .search-filters input, .search-filters select { padding:10px 16px; border:2px solid #e2e8f0; border-radius:10px; font-size:13px; background:#fff; transition:all .3s; flex:1; min-width:150px; }
        .search-filters input:focus, .search-filters select:focus { outline:none; border-color:#4338CA; box-shadow:0 0 0 4px rgba(67,56,202,.08); }

        /* ===== ACTION BUTTONS ===== */
        .btn-add { padding:10px 22px; background:linear-gradient(135deg,#4338CA,#6366f1); color:#fff; border:none; border-radius:10px; font-weight:700; font-size:13px; cursor:pointer; transition:all .3s; box-shadow:0 4px 12px rgba(67,56,202,.25); }
        .btn-add:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(67,56,202,.35); }
        .btn-approve { padding:6px 14px; background:linear-gradient(135deg,#10b981,#059669); color:#fff; border:none; border-radius:8px; font-weight:700; font-size:12px; cursor:pointer; transition:all .2s; }
        .btn-approve:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(16,185,129,.3); }
        .btn-reject { padding:6px 14px; background:linear-gradient(135deg,#ef4444,#dc2626); color:#fff; border:none; border-radius:8px; font-weight:700; font-size:12px; cursor:pointer; transition:all .2s; margin-left:6px; }
        .btn-reject:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(239,68,68,.3); }
        .pending-count { background:linear-gradient(135deg,#ef4444,#dc2626); color:#fff; padding:4px 12px; border-radius:20px; font-size:13px; font-weight:700; margin-left:8px; }

        /* ===== QUICK ACTIONS ===== */
        .quick-actions { display:flex; gap:10px; flex-wrap:wrap; }
        .quick-action-btn { display:flex; align-items:center; gap:8px; padding:12px 18px; background:#fff; border:1px solid #e2e8f0; border-radius:12px; font-size:13px; font-weight:700; color:#334155; cursor:pointer; transition:all .25s; }
        .quick-action-btn:hover { background:linear-gradient(135deg,#eef2ff,#f5f3ff); border-color:#c7d2fe; color:#4338CA; transform:translateY(-2px); box-shadow:0 6px 15px rgba(67,56,202,.1); }
        .quick-action-btn svg { width:18px; height:18px; stroke-width:2; }

        /* ===== STUDENT ITEMS (modal list) ===== */
        .student-item { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-bottom:1px solid #f1f5f9; }
        .student-item:last-child { border-bottom:none; }
        .student-name { font-weight:700; font-size:14px; color:#0F172A; }
        .student-info { font-size:12px; color:#64748b; margin-top:2px; }
        .students-list { max-height:400px; overflow-y:auto; }

        /* ===== TOAST (page-level override) ===== */
        .toast-container { position:fixed; top:20px; right:20px; z-index:9999; }
        .toast { padding:15px 25px; border-radius:12px; margin-bottom:10px; color:#fff; font-weight:700; animation:slideIn .3s ease; box-shadow:0 4px 15px rgba(0,0,0,.15); }
        .toast.success { background:linear-gradient(135deg,#10b981,#059669); }
        .toast.error { background:linear-gradient(135deg,#ef4444,#dc2626); }
        @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
    </style>
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="school-header">
        <div class="school-header-left">
            <div class="school-logo" id="schoolLogo">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                    <path d="M3 21h18M3 7v14M21 7v14M6 21V10M18 21V10M9 21V17h6v4M12 7V3l8 4M4 7l8-4"></path>
                </svg>
            </div>
        </div>
        <div class="school-name" id="schoolName">Loading...</div>
        <div class="school-header-right">
            <div class="profile-wrapper">
                <div class="header-icon" id="profileIcon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <div class="profile-dropdown" id="profileDropdown">
                    <div class="profile-dropdown-item" id="profileEmail">Loading...</div>
                    <div class="profile-dropdown-item logout" onclick="logout()">Logout</div>
                </div>
            </div>
        </div>
    </div>

    <div class="school-main">
        <div class="school-sidebar">
            <a href="dashboard.html" class="school-sidebar-item">HOME</a>
            <a href="teachers.html" class="school-sidebar-item">TEACHER</a>
            <a href="students.html" class="school-sidebar-item">STUDENTS</a>
            <a href="pending-students.html" class="school-sidebar-item active">PENDING</a>
            <a href="overview.html" class="school-sidebar-item">OVERVIEW</a>
            <a href="plans.html" class="school-sidebar-item">PLANS</a>
            <a href="support.html" class="school-sidebar-item">SUPPORT</a>
            <a href="send-message.html" class="school-sidebar-item">SEND MESSAGE</a>
            <a href="events.html" class="school-sidebar-item">EVENTS</a>
            <a href="exams.html" class="school-sidebar-item">EXAMS</a>
            <div class="school-sidebar-item" onclick="logout()">LOGOUT</div>
        </div>

        <div class="school-content">
            <div class="page-title-bar">
                <div class="page-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    Pending Student Requests
                    <span class="pending-count" id="pendingCount">0</span>
                </div>
            </div>

            <div class="students-table">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Student Name</th>
                            <th>Class</th>
                            <th>Section</th>
                            <th>Roll No</th>
                            <th>Added By</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="pendingTableBody">
                        <tr>
                            <td colspan="8" style="text-align:center;padding:20px;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        var schoolId = '';

        function showToast(message, type) {
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast ' + (type || 'info');
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(function () { toast.remove(); }, 3000);
        }

        document.addEventListener('DOMContentLoaded', function () {
            var token = localStorage.getItem('schoolToken');
            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            loadSchoolData();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('profileIcon').addEventListener('click', function (e) {
                e.stopPropagation();
                document.getElementById('profileDropdown').classList.toggle('show');
            });

            document.addEventListener('click', function () {
                document.getElementById('profileDropdown').classList.remove('show');
            });
        }

        async function loadSchoolData() {
            var token = localStorage.getItem('schoolToken');
            try {
                var response = await fetch('/api/school-auth/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!response.ok) {
                    window.location.href = 'index.html';
                    return;
                }
                var school = await response.json();
                schoolId = school._id;
                document.getElementById('schoolName').textContent = school.name.toUpperCase();
                document.getElementById('profileEmail').textContent = school.email || 'Profile';
                if (school.logo) {
                    document.getElementById('schoolLogo').innerHTML = '<img src="' + school.logo + '" alt="Logo">';
                }
                loadPendingStudents();
            } catch (error) {
                console.error('Load school data error:', error);
            }
        }

        async function loadPendingStudents() {
            var token = localStorage.getItem('schoolToken');
            var tableBody = document.getElementById('pendingTableBody');

            try {
                var response = await fetch('/api/school-auth/pending-students', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (!response.ok) {
                    tableBody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:20px;">Error loading pending students</td></tr>';
                    return;
                }

                var students = await response.json();
                document.getElementById('pendingCount').textContent = students.length;

                if (students.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="8" class="no-data">No pending student requests</td></tr>';
                    return;
                }

                tableBody.innerHTML = students.map(function (s, index) {
                    var addedDate = new Date(s.createdAt).toLocaleDateString();
                    var teacherName = s.teacherId ? s.teacherId.name : 'Unknown';
                    return '<tr>' +
                        '<td>' + (index + 1) + '</td>' +
                        '<td>' + s.name + '</td>' +
                        '<td>' + s.className + '</td>' +
                        '<td>' + (s.section || 'A') + '</td>' +
                        '<td>' + (s.rollNo || '-') + '</td>' +
                        '<td>' + teacherName + '</td>' +
                        '<td>' + addedDate + '</td>' +
                        '<td>' +
                        '<button class="btn-approve" onclick="approveStudent(\'' + s._id + '\')">Approve</button>' +
                        '<button class="btn-reject" onclick="rejectStudent(\'' + s._id + '\')">Reject</button>' +
                        '</td>' +
                        '</tr>';
                }).join('');

            } catch (error) {
                console.error('Load pending students error:', error);
                tableBody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:20px;">Error loading pending students</td></tr>';
            }
        }

        async function approveStudent(studentId) {
            var token = localStorage.getItem('schoolToken');
            try {
                var response = await fetch('/api/school-auth/approve-student/' + studentId, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                var data = await response.json();
                if (response.ok) {
                    showToast('Student approved successfully!', 'success');
                    loadPendingStudents();
                } else {
                    showToast(data.message || 'Error approving student', 'error');
                }
            } catch (error) {
                showToast('Error approving student', 'error');
            }
        }

        async function rejectStudent(studentId) {
            if (!confirm('Are you sure you want to reject this student?')) return;

            var token = localStorage.getItem('schoolToken');
            try {
                var response = await fetch('/api/school-auth/reject-student/' + studentId, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                var data = await response.json();
                if (response.ok) {
                    showToast('Student rejected', 'success');
                    loadPendingStudents();
                } else {
                    showToast(data.message || 'Error rejecting student', 'error');
                }
            } catch (error) {
                showToast('Error rejecting student', 'error');
            }
        }

        function logout() {
            localStorage.removeItem('schoolToken');
            localStorage.removeItem('schoolData');
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
