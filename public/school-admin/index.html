<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Admin Login</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { margin:0; font-family:'Inter',sans-serif; }
        .school-login-container {
            min-height:100vh; display:flex; align-items:center; justify-content:center;
            background:linear-gradient(135deg,#0F172A 0%,#1e293b 50%,#4338CA 100%);
        }
        .school-login-box {
            background:#fff; border:none; border-radius:20px; padding:44px; width:100%; max-width:420px;
            box-shadow:0 20px 60px rgba(0,0,0,.25);
        }
        .school-login-header { text-align:center; margin-bottom:30px; }
        .school-login-header h1 { font-size:24px; color:#0F172A; margin-bottom:8px; font-weight:800; }
        .school-login-header p { color:#64748b; font-size:14px; }
        .school-login-form .form-group { margin-bottom:20px; }
        .school-login-form label { display:block; font-size:13px; font-weight:700; color:#475569; margin-bottom:8px; text-transform:uppercase; letter-spacing:.5px; }
        .school-login-form input { width:100%; padding:13px 16px; border:2px solid #e2e8f0; border-radius:12px; font-size:15px; box-sizing:border-box; background:#f8fafc; transition:all .3s; }
        .school-login-form input:focus { outline:none; border-color:#4338CA; box-shadow:0 0 0 4px rgba(67,56,202,.1); background:#fff; }
        .school-login-form .btn-login {
            width:100%; padding:14px; background:linear-gradient(135deg,#4338CA,#7C3AED); color:#fff;
            border:none; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; margin-top:10px;
            box-shadow:0 4px 15px rgba(67,56,202,.3); transition:all .3s;
        }
        .school-login-form .btn-login:hover { transform:translateY(-2px); box-shadow:0 6px 25px rgba(67,56,202,.4); }
    </style>
    <link rel="stylesheet" href="../css/school-admin-layout.css">
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="school-login-container">
        <div class="school-login-box" id="loginBox">
            <div class="school-login-header">
                <img src="/logo.jpeg" alt="ATKool" style="width:90px;height:90px;border-radius:16px;margin:0 auto 15px;display:block;box-shadow:0 4px 15px rgba(67,56,202,.15)">
                <h1>School Admin Login</h1>
                <p>Enter your school credentials to continue</p>
            </div>

            <form class="school-login-form" id="loginForm">
                <div class="form-group">
                    <label for="loginId">Email or Phone Number</label>
                    <input type="text" id="loginId" placeholder="Enter email or 10-digit phone number" required>
                    <small style="display:block;margin-top:4px;color:#94a3b8;font-size:11px;">Use your registered Gmail ID or 10-digit mobile number</small>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn-login">Login</button>
            </form>
        </div>


    </div>

    <script>
        function showToast(message, type) {
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast ' + (type || 'info');

            var iconSvg = '';
            if (type === 'success') {
                iconSvg = '<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>';
            } else if (type === 'error') {
                iconSvg = '<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>';
            } else {
                iconSvg = '<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>';
            }

            toast.innerHTML = iconSvg +
                '<span class="toast-message">' + message + '</span>' +
                '<button class="toast-close" onclick="this.parentElement.remove()">' +
                '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"></path></svg>' +
                '</button>';

            container.appendChild(toast);

            setTimeout(function () {
                toast.style.animation = 'slideOut 0.3s ease';
                setTimeout(function () {
                    toast.remove();
                }, 300);
            }, 3000);
        }

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            var loginId = document.getElementById('loginId').value.trim();
            var password = document.getElementById('password').value;

            // Detect if phone number (10 digits) or email
            var isPhone = /^\d{10}$/.test(loginId);
            var isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(loginId);

            if (!isPhone && !isEmail) {
                showToast('Please enter a valid email or 10-digit phone number', 'error');
                return;
            }

            var body = { password: password };
            if (isPhone) {
                body.mobileNo = loginId;
            } else {
                body.email = loginId;
            }

            try {
                var response = await fetch('/api/school-auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });

                var data = await response.json();

                if (response.ok) {
                    localStorage.setItem('schoolToken', data.token);
                    localStorage.setItem('schoolData', JSON.stringify(data.school));
                    showToast('Login successful!', 'success');
                    setTimeout(function () {
                        window.location.href = 'dashboard.html';
                    }, 500);
                } else {
                    showToast(data.message || 'Login failed', 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                showToast('Error connecting to server', 'error');
            }
        });

        if (localStorage.getItem('schoolToken')) {
            window.location.href = 'dashboard.html';
        }
    </script>
<script src="/js/pwa.js"></script>
</body>

</html>
