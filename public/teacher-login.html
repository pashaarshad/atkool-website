<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login - ATKool</title>
    <link rel="manifest" href="/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Inter',sans-serif; background:linear-gradient(135deg,#0F172A 0%,#1e293b 50%,#4338CA 100%); display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .login-container { background:#fff; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,.25); padding:44px; width:100%; max-width:420px; box-sizing:border-box; }
        .login-header { text-align:center; margin-bottom:30px; }
        .icon-circle { width:80px; height:80px; background:linear-gradient(135deg,#4338CA,#7C3AED); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 15px; box-shadow:0 4px 15px rgba(67,56,202,.3); }
        .icon-circle svg { width:40px; height:40px; color:#fff; }
        .login-header h1 { font-size:26px; font-weight:800; color:#0F172A; margin:0 0 8px 0; }
        .login-header p { color:#64748b; font-size:14px; margin:0; }
        .form-group { margin-bottom:20px; }
        .form-group label { display:block; margin-bottom:8px; color:#475569; font-weight:600; font-size:13px; text-transform:uppercase; letter-spacing:.5px; }
        .form-group input { width:100%; padding:13px 16px; border:2px solid #e2e8f0; border-radius:12px; font-size:15px; transition:all .3s; background:#f8fafc; box-sizing:border-box; }
        .form-group input:focus { outline:none; border-color:#4338CA; box-shadow:0 0 0 4px rgba(67,56,202,.1); background:#fff; }
        .btn-login { width:100%; padding:14px; background:linear-gradient(135deg,#4338CA,#7C3AED); color:#fff; border:none; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; transition:all .3s; box-shadow:0 4px 15px rgba(67,56,202,.3); margin-top:10px; }
        .btn-login:hover { transform:translateY(-2px); box-shadow:0 6px 25px rgba(67,56,202,.4); }

        /* Toast Notifications */
        .toast-container { position:fixed; top:20px; right:20px; z-index:1000; }
        .toast { min-width:250px; margin-bottom:10px; padding:15px 20px; border-radius:12px; color:#fff; display:flex; align-items:center; box-shadow:0 4px 15px rgba(0,0,0,.15); animation:slideIn .3s ease forwards; font-weight:600; }
        .toast.success { background:linear-gradient(135deg,#10B981,#059669); }
        .toast.error { background:linear-gradient(135deg,#EF4444,#DC2626); }
        @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
    </style>
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="login-container">
        <div class="login-header">
            <img src="/logo.jpeg" alt="ATKool Logo" style="width:90px;height:90px;border-radius:16px;margin:0 auto 15px;display:block;box-shadow:0 4px 15px rgba(107,78,255,0.2)">
            <h1>Teacher Portal</h1>
            <p>Login to manage your classes and students</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="loginId">Email or Phone Number</label>
                <input type="text" id="loginId" placeholder="Enter your email or 10-digit phone number" required>
                <small style="display:block;margin-top:4px;color:#94a3b8;font-size:11px;">Use your registered Gmail ID or 10-digit mobile number</small>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login">LOGIN</button>
        </form>
        <div id="verifyBox" style="display:none;margin-top:18px;padding:14px;border:1px solid #c7d2fe;background:#eef2ff;border-radius:12px;color:#334155;font-size:13px;line-height:1.5">
            <strong>Email verification required.</strong>
            <div style="margin-top:6px">Please verify your email address, or request a fresh verification link.</div>
            <button type="button" onclick="requestTeacherVerification()" style="margin-top:12px;padding:10px 14px;border:none;border-radius:10px;background:#4338CA;color:#fff;font-weight:700;cursor:pointer">Send Verification Link</button>
        </div>
    </div>

    <script>
        function showToast(message, type) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const loginId = document.getElementById('loginId').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.querySelector('.btn-login');

            // Detect if phone number (10 digits) or email
            const isPhone = /^\d{10}$/.test(loginId);
            const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(loginId);

            if (!isPhone && !isEmail) {
                showToast('Please enter a valid email or 10-digit phone number', 'error');
                return;
            }

            btn.innerText = 'Logging in...';
            btn.disabled = true;

            const body = { password };
            if (isPhone) {
                body.mobileNo = loginId;
            } else {
                body.email = loginId;
            }

            try {
                const response = await fetch('/api/teacher-auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('teacherToken', data.token);
                    localStorage.setItem('teacherData', JSON.stringify(data.teacher || data.user));
                    showToast('Login successful!', 'success');
                    setTimeout(() => {
                        window.location.href = '/teacher-dashboard.html'; // We will build this next
                    }, 1000);
                } else {
                    if (data.verificationRequired) {
                        document.getElementById('verifyBox').style.display = 'block';
                    }
                    showToast(data.message || 'Login failed', 'error');
                    btn.innerText = 'LOGIN';
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error connecting to server', 'error');
                btn.innerText = 'LOGIN';
                btn.disabled = false;
            }
        });

        async function requestTeacherVerification() {
            const loginId = document.getElementById('loginId').value.trim();
            const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(loginId);
            if (!isEmail) {
                showToast('Enter a valid email for verification', 'error');
                return;
            }
            const email = loginId;

            try {
                const response = await fetch('/api/email-verification/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userType: 'teacher', email })
                });
                const data = await response.json();
                showToast(data.message || (response.ok ? 'Verification link sent' : 'Unable to send link'), response.ok ? 'success' : 'error');
            } catch (error) {
                showToast('Error connecting to server', 'error');
            }
        }
    </script>
<script src="/js/pwa.js"></script>
</body>

</html>
