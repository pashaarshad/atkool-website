<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms & Condition - School Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="main-container">
        <div class="sidebar">
            <a href="dashboard.html" class="sidebar-item">SUPER ADMIN</a>
            <a href="office-staff.html" class="sidebar-item">OFFICE STAFF</a>
            <a href="schools.html" class="sidebar-item">SCHOOL List</a>
            <div class="sidebar-item has-submenu" id="plansMenu" onclick="togglePlansMenu(event)">
                PLANS
                <div class="submenu" id="plansSubmenu">
                    <a href="plans.html" class="submenu-item">Plans</a>
                    <a href="subscription-list.html" class="submenu-item">Subscription List</a>
                    <a href="overview.html" class="submenu-item">Overview</a>
                </div>
            </div>
            <a href="send-message.html" class="sidebar-item">SEND MESSAGE</a>
            <a href="support.html" class="sidebar-item">SUPPORT</a>
            <div class="sidebar-item active">TERMS & CONDITION</div>
        </div>
        <div class="content">
            <div class="terms-container">
                <div class="terms-content" id="termsContent">
                    Loading...
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="view-modal" style="max-width: 800px;">
            <div class="view-modal-header">
                <h2>Edit Terms & Conditions</h2>
                <button class="view-modal-close" onclick="closeEditModal()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div class="view-modal-content">
                <textarea class="terms-textarea" id="termsTextarea"></textarea>
                <div class="form-actions" style="margin-top: 15px;">
                    <button class="btn btn-cancel" onclick="closeEditModal()">Cancel</button>
                    <button class="btn btn-dark" onclick="saveTerms()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePlansMenu(event) {
            event.stopPropagation();
            var submenu = document.getElementById('plansSubmenu');
            var menu = document.getElementById('plansMenu');
            submenu.classList.toggle('show');
            menu.classList.toggle('active');
        }
    </script>
    <script src="js/terms.js"></script>
</body>

</html>
