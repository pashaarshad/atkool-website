<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - School Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="main-container">
        <div class="sidebar">
            <div style="padding:18px;text-align:center;background:#0F172A;border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:10"><img src="/logo.jpeg" alt="ATKool" style="width:50px;height:50px;border-radius:12px"></div>
            <div class="sidebar-item active">SUPER ADMIN</div>
            <a href="office-staff.html" class="sidebar-item">OFFICE STAFF</a>
            <div class="sidebar-item has-submenu" id="schoolListMenu">
                SCHOOL List
                <div class="submenu" id="schoolSubmenu">
                    <a href="schools.html" class="submenu-item">School List</a>
                    <a href="users.html" class="submenu-item">All Teachers</a>
                    <a href="payments.html" class="submenu-item">Payment Details</a>
                </div>
            </div>
            <div class="sidebar-item has-submenu" id="plansMenu" onclick="togglePlansMenu(event)">
                PLANS
                <div class="submenu" id="plansSubmenu">
                    <a href="plans.html" class="submenu-item">Plans</a>
                    <a href="subscription-list.html" class="submenu-item">Subscription List</a>
                    <a href="overview.html" class="submenu-item">Overview</a>
                </div>
            </div>
            <a href="send-message.html" class="sidebar-item">SEND MESSAGE</a>
            <a href="support.html" class="sidebar-item">SUPPORT</a>
            <a href="terms.html" class="sidebar-item">TERMS & CONDITION</a>
            <a href="#" class="sidebar-item" onclick="localStorage.removeItem('adminToken'); localStorage.removeItem('adminUser'); window.location.href='/index.html'; return false;" style="color: #ef4444; margin-top: auto; font-weight: bold;">
                <span style="margin-right: 8px">👋</span> LOGOUT
            </a>
        </div>
        <div class="content">
            <div class="stats-row">
                <div class="stat-card">
                    <h3>Total Schools</h3>
                    <div class="value" id="totalSchools">0</div>
                </div>
                <div class="stat-card">
                    <h3>Active Plans</h3>
                    <div class="value" id="activePlans">0</div>
                </div>
                <div class="stat-card">
                    <h3>system use</h3>
                    <div class="value" id="systemUse">0%</div>
                </div>
            </div>

            <div class="section-card">
                <h3>Total No. of Managers</h3>
                <div class="info-box">
                    <span>Office Staff:-</span>
                    <span id="officeStaff">0</span>
                </div>
            </div>

            <div class="section-card">
                <h3>Total No. of Users</h3>
                <div class="info-box">
                    <span>Total Users:-</span>
                    <span id="totalUsers">0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePlansMenu(event) {
            event.stopPropagation();
            var submenu = document.getElementById('plansSubmenu');
            var menu = document.getElementById('plansMenu');
            submenu.classList.toggle('show');
            menu.classList.toggle('active');
        }
    </script>
    <script src="js/dashboard.js"></script>
</body>

</html>
