<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add School - School Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="main-container">
        <div class="sidebar">
            <div
                style="padding:18px;text-align:center;background:#0F172A;border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:10">
                <img src="/logo.jpeg" alt="ATKool" style="width:50px;height:50px;border-radius:12px">
            </div>
            <a href="dashboard.html" class="sidebar-item">SUPER ADMIN</a>
            <a href="office-staff.html" class="sidebar-item">OFFICE STAFF</a>
            <div class="sidebar-item active has-submenu" id="schoolListMenu">
                SCHOOL List
                <div class="submenu show" id="schoolSubmenu">
                    <a href="schools.html" class="submenu-item">School List</a>
                    <a href="users.html" class="submenu-item">All Teachers</a>
                    <a href="payments.html" class="submenu-item">Payment Details</a>
                </div>
            </div>
            <a href="plans.html" class="sidebar-item">PLANS</a>
            <a href="subscription-list.html" class="sidebar-item sidebar-item-tall">SUBSCRIPTION LIST</a>
            <a href="overview.html" class="sidebar-item">OVERVIEW</a>
            <a href="send-message.html" class="sidebar-item">SEND MESSAGE</a>
            <a href="support.html" class="sidebar-item">SUPPORT</a>
            <a href="terms.html" class="sidebar-item">TERMS & CONDITION</a>
            <a href="#" class="sidebar-item"
                onclick="localStorage.removeItem('adminToken'); localStorage.removeItem('adminUser'); window.location.href='/index.html'; return false;"
                style="color: #ef4444; margin-top: auto; font-weight: bold;">
                <span style="margin-right: 8px">👋</span> LOGOUT
            </a>
        </div>
        <div class="content">
            <div class="page-header">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 21h18M3 7v14M21 7v14M6 21V10M18 21V10M9 21V17h6v4M12 7V3l8 4M4 7l8-4"></path>
                </svg>
                <h2>Add School</h2>
            </div>

            <div class="form-card">
                <form id="addSchoolForm">
                    <div class="form-row">
                        <label class="form-label">School Name:</label>
                        <input type="text" class="form-input" id="schoolName" required>
                    </div>
                    <div class="form-row">
                        <label class="form-label">Owner Name:</label>
                        <input type="text" class="form-input" id="ownerName">
                    </div>
                    <div class="form-row">
                        <label class="form-label">Mobile *:</label>
                        <input type="text" class="form-input" id="mobile" required maxlength="10" pattern="\d{10}">
                    </div>
                    <div class="form-row">
                        <label class="form-label">Email Id *:</label>
                        <div class="input-with-button">
                            <input type="email" class="form-input" id="email" required placeholder="Enter school Gmail address">
                            <button type="button" class="btn btn-upload" id="btnSendOtp" style="min-width: 90px; padding: 10px;">Verify</button>
                        </div>
                    </div>
                    <div class="form-row" id="otpVerificationRow" style="display: none;">
                        <label class="form-label" style="color: #ea580c; font-weight: bold;">Enter OTP *:</label>
                        <div class="input-with-button">
                            <input type="text" class="form-input" id="emailOtp" placeholder="Enter 6-digit OTP code" maxlength="6" pattern="\d{6}">
                            <button type="button" class="btn btn-upload" id="btnVerifyOtp" style="min-width: 90px; padding: 10px; background: #10b981; border-color: #10b981;">Confirm</button>
                        </div>
                    </div>
                    <div class="form-row" id="otpStatusRow" style="display: none;">
                        <label class="form-label"></label>
                        <div id="otpStatusMessage" style="font-size: 13px; font-weight: bold; display: flex; align-items: center; gap: 6px;"></div>
                    </div>
                    <div class="form-row">
                        <label class="form-label">Address:</label>
                        <input type="text" class="form-input" id="address">
                    </div>
                    <div class="form-row">
                        <label class="form-label">State:</label>
                        <input type="text" class="form-input" id="state">
                    </div>
                    <div class="form-row">
                        <label class="form-label">City:</label>
                        <input type="text" class="form-input" id="city" required>
                    </div>
                    <div class="form-row">
                        <label class="form-label">Zip Code:</label>
                        <input type="text" class="form-input" id="zipCode">
                    </div>
                    <div class="form-row">
                        <label class="form-label">GST No:</label>
                        <div class="input-with-button">
                            <input type="text" class="form-input" id="gstNo">
                            <label class="btn btn-upload">
                                Upload File
                                <input type="file" id="gstFile" accept=".pdf,.jpg,.png" hidden>
                            </label>
                        </div>
                    </div>
                    <div class="form-row">
                        <label class="form-label">Password *:</label>
                        <div class="input-with-button">
                            <input type="password" class="form-input" id="password" required>
                            <button type="button" class="btn btn-upload" id="togglePassword" style="min-width: 50px; padding: 10px; display: flex; align-items: center; justify-content: center;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-row">
                        <label class="form-label">Confirm Password *:</label>
                        <div class="input-with-button">
                            <input type="password" class="form-input" id="confirmPassword" required>
                            <button type="button" class="btn btn-upload" id="toggleConfirmPassword" style="min-width: 50px; padding: 10px; display: flex; align-items: center; justify-content: center;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-row" id="passwordFeedbackRow" style="display: none;">
                        <label class="form-label"></label>
                        <div id="passwordFeedback" style="color: #ef4444; font-size: 12px; font-weight: bold;"></div>
                    </div>
                    <div class="form-row">
                        <label class="form-label">Logo:</label>
                        <div class="input-with-button">
                            <label class="btn btn-upload">
                                Upload File
                                <input type="file" id="logoFile" accept=".jpg,.png,.svg" hidden>
                            </label>
                            <span class="file-name" id="logoFileName"></span>
                        </div>
                    </div>

                    <!-- School Images Section -->
                    <div class="form-row">
                        <label class="form-label">Upload School Images (Max 6):</label>
                        <div class="input-with-button">
                            <label class="btn btn-upload">
                                Select Images
                                <input type="file" id="schoolImages" accept=".jpg,.png,.jpeg" multiple hidden>
                            </label>
                        </div>
                    </div>
                    <div class="form-row" id="imagePreviewContainer"
                        style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px;">
                        <!-- Image previews will appear here -->
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-dark">Create Now</button>
                        <button type="button" class="btn btn-cancel"
                            onclick="window.location.href='schools.html'">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/add-school.js"></script>
</body>

</html>
