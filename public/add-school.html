<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add School - School Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .form-card {
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            max-width: 800px;
            margin: 0 auto;
        }
        .form-row {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-label {
            font-weight: 600;
            color: #334155;
            font-size: 14px;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            box-sizing: border-box;
            background: #f8fafc;
            transition: all 0.3s;
        }
        .form-input:focus {
            outline: none;
            border-color: #4338CA;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(67, 56, 202, 0.1);
        }
        .input-with-button {
            display: flex;
            gap: 10px;
        }
        .btn-upload {
            padding: 12px 20px;
            background: #e2e8f0;
            color: #475569;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            display: inline-block;
            transition: all 0.2s;
        }
        .btn-upload:hover {
            background: #cbd5e1;
        }
        .file-name {
            align-self: center;
            font-size: 13px;
            color: #64748b;
        }
    </style>
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="main-container">
        <div class="sidebar">
            <div style="padding:18px;text-align:center;background:#0F172A;border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:10"><img src="/logo.jpeg" alt="ATKool" style="width:50px;height:50px;border-radius:12px"></div>
            <a href="dashboard.html" class="sidebar-item">SUPER ADMIN</a>
            <a href="office-staff.html" class="sidebar-item">OFFICE STAFF</a>
            <div class="sidebar-item active has-submenu" id="schoolListMenu">
                SCHOOL List
                <div class="submenu show" id="schoolSubmenu">
                    <a href="schools.html" class="submenu-item">School List</a>
                    <a href="users.html" class="submenu-item">All Teachers</a>
                    <a href="payments.html" class="submenu-item">Payment Details</a>
                </div>
            </div>
            <a href="plans.html" class="sidebar-item">PLANS</a>
            <a href="subscription-list.html" class="sidebar-item sidebar-item-tall">SUBSCRIPTION LIST</a>
            <a href="overview.html" class="sidebar-item">OVERVIEW</a>
            <a href="send-message.html" class="sidebar-item">SEND MESSAGE</a>
            <a href="support.html" class="sidebar-item">SUPPORT</a>
            <a href="terms.html" class="sidebar-item">TERMS & CONDITION</a>
            <a href="#" class="sidebar-item" onclick="localStorage.removeItem('adminToken'); localStorage.removeItem('adminUser'); window.location.href='/index.html'; return false;" style="color: #ef4444; margin-top: auto; font-weight: bold;">
                <span style="margin-right: 8px">👋</span> LOGOUT
            </a>
        </div>
        <div class="content">
            <div class="page-header">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 21h18M3 7v14M21 7v14M6 21V10M18 21V10M9 21V17h6v4M12 7V3l8 4M4 7l8-4"></path>
                </svg>
                <h2>Add School</h2>
            </div>

            <div class="form-card">
                <form id="addSchoolForm">
                    <div class="form-row-grid">
                        <div class="form-row">
                            <label class="form-label">School Name *:</label>
                            <input type="text" class="form-input" id="schoolName" placeholder="Enter school name" required>
                        </div>
                        <div class="form-row">
                            <label class="form-label">Owner Name:</label>
                            <input type="text" class="form-input" id="ownerName" placeholder="Enter owner name">
                        </div>
                    </div>

                    <div class="form-row-grid">
                        <div class="form-row">
                            <label class="form-label">Mobile *:</label>
                            <input type="text" class="form-input" id="mobile" placeholder="Enter 10-digit mobile number" required maxlength="10" pattern="\d{10}">
                        </div>
                        <div class="form-row">
                            <label class="form-label">Email Id *:</label>
                            <input type="email" class="form-input" id="email" placeholder="Enter Gmail/email address" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <label class="form-label">Address:</label>
                        <input type="text" class="form-input" id="address" placeholder="Enter full address">
                    </div>

                    <div class="form-row-grid">
                        <div class="form-row">
                            <label class="form-label">State:</label>
                            <input type="text" class="form-input" id="state" placeholder="Enter state name">
                        </div>
                        <div class="form-row">
                            <label class="form-label">City *:</label>
                            <input type="text" class="form-input" id="city" placeholder="Enter city name" required>
                        </div>
                    </div>

                    <div class="form-row-grid">
                        <div class="form-row">
                            <label class="form-label">Zip Code:</label>
                            <input type="text" class="form-input" id="zipCode" placeholder="Enter zip code">
                        </div>
                        <div class="form-row">
                            <label class="form-label">GST No:</label>
                            <div class="input-with-button">
                                <input type="text" class="form-input" id="gstNo" placeholder="Enter GST Number" style="flex: 1;">
                                <label class="btn-upload" style="margin: 0;">
                                    Upload File
                                    <input type="file" id="gstFile" accept=".pdf,.jpg,.png" hidden>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="form-row-grid">
                        <div class="form-row">
                            <label class="form-label">Password *:</label>
                            <input type="password" class="form-input" id="password" placeholder="Enter password for school login" required>
                        </div>
                        <div class="form-row">
                            <label class="form-label">Logo:</label>
                            <div class="input-with-button">
                                <label class="btn-upload" style="margin: 0;">
                                    Upload File
                                    <input type="file" id="logoFile" accept=".jpg,.png,.svg" hidden>
                                </label>
                                <span class="file-name" id="logoFileName"></span>
                            </div>
                        </div>
                    </div>

                    <!-- School Images Section -->
                    <div class="form-row">
                        <label class="form-label">Upload School Images (Max 6):</label>
                        <div class="input-with-button">
                            <label class="btn-upload" style="margin: 0;">
                                Select Images
                                <input type="file" id="schoolImages" accept=".jpg,.png,.jpeg" multiple hidden>
                            </label>
                        </div>
                    </div>
                    <div class="form-row" id="imagePreviewContainer" style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px;">
                        <!-- Image previews will appear here -->
                    </div>

                    <div class="form-actions" style="display: flex; gap: 10px; justify-content: center; margin-top: 30px;">
                        <button type="submit" class="btn btn-dark" style="padding: 12px 30px;">Create Now</button>
                        <button type="button" class="btn btn-cancel" style="padding: 12px 30px;"
                            onclick="window.location.href='schools.html'">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/add-school.js"></script>
</body>

</html>
