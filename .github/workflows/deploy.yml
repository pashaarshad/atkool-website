name: Deploy Atkool Website to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: SSH to VPS and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: 187.127.153.92
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/atkool-website
            git pull origin main
            npm install
            pm2 restart atkool-website
